<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login | siPeKa PPKBD</title>
  
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins', sans-serif; }
    /* Tema Latar Belakang Biru Profesional dari Dashboard */
    .bg-gradient-biru {
      background: linear-gradient(135deg, #002d5f 0%, #001a38 100%);
    }
    /* Efek Kaca Buram Modern untuk Wadah Form */
    .glass-effect {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="bg-gradient-biru flex items-center justify-center min-h-screen p-6">

<div class="w-full max-w-sm">

  <div class="flex justify-center mb-6">
    <img src="logo-sipeka-login.png" alt="Logo siPeKa PPKBD" class="w-full h-auto object-contain drop-shadow-2xl">
  </div>

  <div class="glass-effect p-10 rounded-[2.5rem] shadow-2xl border border-white/20">
    
    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-blue-900 tracking-widest uppercase mb-2">LOGIN</h1>
      
      <p id="motivasi-login" class="text-[10px] text-gray-500 font-medium italic px-4 min-h-[32px] transition-all duration-500"></p>
    </div>

    <div class="space-y-4">
      <input id="nik" type="text" placeholder="Masukkan 16 digit NIK"
        class="w-full p-4 bg-slate-100 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-600 text-sm font-bold text-center text-blue-900 transition-all">

      <input id="password" type="password" placeholder="••••••••"
        class="w-full p-4 bg-slate-100 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-600 text-sm font-bold text-center text-blue-900 transition-all">
    </div>

    <p id="info" class="text-center text-xs font-bold text-red-500 min-h-[1rem] mt-3"></p>

    <button onclick="login()"
      class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-900/20 hover:bg-blue-800 active:scale-95 transition tracking-widest text-sm mt-5 uppercase">
      Masuk Sekarang
    </button>
  </div>
<script>
  // Begitu buka halaman login, hapus semua sisa login lama
  localStorage.clear(); 
  
  // Munculkan motivasi
  if (typeof tampilkanMotivasi === 'function') tampilkanMotivasi();
</script>
<script src="script.js"></script>
<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
    &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
    Aplikasi Pelaporan Kinerja PPKBD
</footer>
</body>
</html>
