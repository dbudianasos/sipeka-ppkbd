<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login SIPEKA</title>
  
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen p-6">

<div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border-t-[10px] border-blue-900">

  <div class="flex justify-center mb-6">
    <img src="logo-sipeka-login.png" alt="Logo SIPEKA" class="w-32 h-auto object-contain rounded-xl shadow-sm">
  </div>

  <h1 class="text-xl font-black text-blue-900 tracking-tight">Wilayah V</h1>
  <p class="text-gray-400 text-[10px] mb-8 uppercase tracking-widest font-bold">Kabupaten Bekasi</p>

  <input id="nik" type="text" placeholder="NIK"
    class="w-full p-4 mb-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-600 text-sm font-bold text-center text-blue-900">

  <input id="password" type="password" placeholder="Password"
    class="w-full p-4 mb-6 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-600 text-sm font-bold text-center text-blue-900">

  <button onclick="login()"
    class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-900/20 hover:bg-blue-800 active:scale-95 transition tracking-widest text-sm">
    MASUK
  </button>

  <p id="info" class="text-red-500 text-xs font-bold mt-4 min-h-[1rem]"></p>

</div>

<script src="script.js"></script>

</body>
</html>
