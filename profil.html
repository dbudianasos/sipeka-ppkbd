<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Profil Saya | siPeKa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .nav-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); }
  </style>
</head>

<body class="bg-slate-100 min-h-screen pb-10">
  <header class="nav-gradient p-5 rounded-b-[2rem] shadow-lg mb-6 text-white">
    <div class="flex items-center gap-4 max-w-5xl mx-auto">
      <button onclick="navigasiKembali()" class="flex items-center gap-2 bg-white/10 p-2 rounded-xl border border-white/10 active:scale-95 transition">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
  </svg>
  <span class="text-xs font-bold uppercase">Kembali</span>
</button>
      <h2 class="text-sm font-black uppercase tracking-widest">Profil Pengguna</h2>
    </div>
  </header>

  <main class="max-w-xl mx-auto px-4">
    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm">
      
      <div class="text-center mb-8">
        <div class="relative inline-block">
          <img id="img-preview" src="def-profil.png" onerror="this.src='def-profil.png'" class="w-28 h-28 bg-slate-200 rounded-[2rem] border-4 border-white shadow-md object-cover mb-3">
          <label for="input-foto" class="absolute bottom-2 right-0 bg-blue-600 text-white p-2 rounded-xl border-2 border-white cursor-pointer active:scale-95 transition">
            📸
          </label>
          <input type="file" id="input-foto" accept="image/*" class="hidden" onchange="previewFoto()">
        </div>
        <h3 id="nama-tampil" class="font-black text-slate-800 uppercase text-lg">Memuat...</h3>
        <p id="nik-tampil" class="text-xs text-slate-400 font-bold"></p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Nomor HP / Whatsapp</label>
          <input id="p-hp" type="number" class="w-full p-4 text-sm font-bold bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-600">
        </div>

        <div>
          <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Alamat Lengkap</label>
          <textarea id="p-alamat" rows="2" class="w-full p-4 text-sm font-bold bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 uppercase" placeholder="Jl. Contoh No. 123..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Kecamatan</label>
            <input id="p-kecamatan" type="text" class="w-full p-4 text-[11px] font-bold bg-gray-100 rounded-2xl text-gray-500" readonly>
          </div>
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Wilayah (Desa)</label>
            <input id="p-desa" type="text" class="w-full p-4 text-[11px] font-bold bg-gray-100 rounded-2xl text-gray-500" readonly>
          </div>
        </div>

        <div class="pt-2">
          <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Ganti Password (Kosongkan jika tetap)</label>
          <input id="p-password" type="password" class="w-full p-4 text-sm font-bold bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-600" placeholder="••••••••">
        </div>

        <button onclick="updateProfil()" id="btn-save" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-lg mt-4 uppercase tracking-widest text-xs active:scale-95 transition">
          Simpan Perubahan
        </button>

        <p id="info" class="text-center text-[10px] font-bold"></p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    // 1. Jalankan Satpam Digital
    cekLogin(); 

    let FOTO_DATA = ""; 

    // 2. FUNGSI PREVIEW & KOMPRES
    function previewFoto() {
      const file = document.getElementById('input-foto').files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 300; 
          const scaleSize = MAX_WIDTH / img.width;
          canvas.width = MAX_WIDTH;
          canvas.height = img.height * scaleSize;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
          document.getElementById('img-preview').src = dataUrl;
          FOTO_DATA = dataUrl.split(',')[1]; 
        }
      };
    }

    // 3. FUNGSI TARIK DATA PROFIL
    function loadProfil() {
      const nik = localStorage.getItem("nik");
      if (!nik) return;

      const namaTampil = document.getElementById("nama-tampil");
      if (namaTampil) namaTampil.innerText = "⌛ Menghubungkan...";

      fetch(`${API_URL}?action=get_profil&nik=${nik}`)
        .then(res => res.json())
        .then(data => {
          if (data.status === "success") {
            if (namaTampil) namaTampil.innerText = data.nama;
            if (document.getElementById("nik-tampil")) document.getElementById("nik-tampil").innerText = nik;
            if (document.getElementById("p-hp")) document.getElementById("p-hp").value = data.hp || "";
            if (document.getElementById("p-alamat")) document.getElementById("p-alamat").value = data.alamat || "";
            if (document.getElementById("p-kecamatan")) document.getElementById("p-kecamatan").value = data.kecamatan || "";
            if (document.getElementById("p-desa")) document.getElementById("p-desa").value = data.desa || "";
            
            if (data.foto && data.foto !== "" && data.foto !== "-") {
              document.getElementById("img-preview").src = "data:image/jpeg;base64," + data.foto;
              localStorage.setItem("foto", data.foto);
            } else {
              document.getElementById("img-preview").src = "logo-sipeka.png"; // Pastikan file ini ada
            }
          }
        })
        .catch(err => {
          console.error(err);
          if (namaTampil) namaTampil.innerText = "❌ Gagal Memuat Data";
        });
    }

    // 4. FUNGSI SIMPAN PERUBAHAN
    function updateProfil() {
      const btn = document.getElementById("btn-save");
      const info = document.getElementById("info");
      
      // Ambil data untuk LOG dan Payload
      const nik = localStorage.getItem("nik");
      const nama = localStorage.getItem("nama");
      const role = localStorage.getItem("role");
      
      const inputHp = document.getElementById("p-hp").value;
      const inputAlamat = document.getElementById("p-alamat").value;
      const inputPass = document.getElementById("p-password").value;

      // Susun Payload yang benar
      const payload = {
        action: "update_profil",
        nik: nik,
        nama: nama, // Untuk log di GAS
        role: role, // Untuk log di GAS
        hp: inputHp,
        alamat: inputAlamat,
        password: inputPass,
        foto_data: FOTO_DATA
      };

      btn.innerText = "⏳ MENYIMPAN...";
      btn.disabled = true;

      fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams(payload)
      })
      .then(res => res.text())
      .then(res => {
        if (res.trim() === "success") {
          if (FOTO_DATA !== "") localStorage.setItem("foto", FOTO_DATA);
          
          info.innerText = "✅ DATA BERHASIL DIPERBARUI";
          info.className = "text-center text-[10px] font-bold text-green-600 mt-2 uppercase";
          
          setTimeout(() => { 
            const currentRole = localStorage.getItem("role");
            window.location.href = currentRole.includes("admin") ? 'dashboard-admin.html' : 'dashboard-kader.html';
          }, 1500);
        } else {
          alert("Gagal memperbarui: " + res);
          btn.disabled = false;
          btn.innerText = "Simpan Perubahan";
        }
      })
      .catch(err => {
        console.error(err);
        alert("Koneksi bermasalah!");
        btn.disabled = false;
        btn.innerText = "Simpan Perubahan";
      });
    }

    // 5. NAVIGASI KEMBALI PINTAR (Cegah bocor)
    function navigasiKembali() {
      const role = localStorage.getItem("role");
      if (role && role.toLowerCase().includes("admin")) {
        window.location.href = "dashboard-admin.html";
      } else {
        window.location.href = "dashboard-kader.html";
      }
    }

    // Jalankan load saat halaman siap
    window.onload = loadProfil;
</script>
</body>
</html>
