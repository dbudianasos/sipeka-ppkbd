<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Profil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>

<body class="bg-slate-100 min-h-screen p-6">

<script src="script.js"></script>
<script>cekLogin();</script>

<!-- HEADER -->
<div class="flex items-center mb-6">
  <button onclick="window.location.href='dashboard.html'" 
    class="mr-4 text-blue-900 font-bold">←</button>
  <h2 class="text-xl font-bold">Profil</h2>
</div>

<!-- CARD -->
<div class="bg-white p-6 rounded-2xl shadow">

  <div class="text-center mb-6">
    <div class="text-5xl mb-2">👤</div>
    <h3 id="nama" class="font-bold text-lg"></h3>
    <p id="nik" class="text-sm text-gray-500"></p>
  </div>

  <div class="space-y-4">

  <div>
    <label class="text-xs font-bold text-gray-500">Nomor HP / Whatsapp</label>
    <input id="hp" type="text" class="w-full p-3 border rounded-xl bg-white focus:ring-2 focus:ring-blue-600 outline-none">
  </div>
  
  <div>
    <label class="text-sm">Wilayah Tugas (Desa)</label>
    <input id="wilayah" type="text" class="w-full p-3 border rounded-lg bg-gray-100" readonly>
    <p class="text-[10px] text-gray-400 mt-1">*Wilayah hanya bisa diubah oleh Admin</p>
  </div>
  
  <div>
  <label class="text-sm">Kecamatan</label>
  <input id="kecamatan" type="text" class="w-full p-3 border rounded-lg bg-gray-100" readonly>
  <p class="text-[10px] text-gray-400 mt-1">*Kecamatan hanya bisa diubah oleh Admin</p>
  </div>
  
  <div>
    <label class="text-sm">Password Baru</label>
    <input id="passwordBaru" type="password" class="w-full p-3 border rounded-lg">
  </div>

  <button onclick="updateProfil()" 
    class="w-full bg-blue-900 text-white p-3 rounded-lg">
    Simpan Perubahan
  </button>

  <p id="info" class="text-center text-sm mt-2"></p>

</div>

</div>
<script>
  cekLogin(); // Pastikan user sudah login

  function loadProfil() {
    const nik = localStorage.getItem("nik");
    
    // Ambil data dari Backend
    fetch(API_URL + "?action=get_profil&nik=" + nik)
      .then(res => res.json())
      .then(data => {
        // Cek label "success" yang kita tambahkan di Apps Script tadi
        if (data.status === "success") {
          document.getElementById("hp").value = data.hp || "";
          document.getElementById("wilayah").value = data.wilayah || "";
          // Kecamatan kita ambil dari memori login agar cepat
          document.getElementById("kecamatan").value = localStorage.getItem("kecamatan") || "";
        }
      })
      .catch(err => console.log("Gagal tarik data profil:", err));
  }

  // Panggil fungsi segera setelah halaman terbuka
  loadProfil();
</script>
<footer class="text-center text-xs text-gray-500 mt-6">
  © Versi 0.1 - 2026 Dian UPTD PP Wil V
</footer>

</body>
</html>
