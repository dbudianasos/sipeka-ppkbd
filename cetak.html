<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cetak Visum | siPeKa PPKBD</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family: 'Poppins', sans-serif; }
    /* Disamakan persis dengan warna dashboard */
    .nav-gradient { background: linear-gradient(135deg, #004a99 0%, #002d5f 100%); }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

<header class="sticky top-0 z-50 nav-gradient py-2.5 px-5 rounded-b-[1.5rem] shadow-lg shadow-blue-900/20 transition-all duration-300">
  <div class="flex items-center gap-3 max-w-5xl mx-auto text-white">
    
    <button onclick="window.location.href='dashboard.html'" 
            class="bg-white/10 hover:bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/10 transition active:scale-95 shadow-sm flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button>

    <div class="leading-tight">
      <h1 class="font-bold text-base md:text-lg tracking-wide">Cetak Visum</h1>
      <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold mt-0.5">Ekspor laporan ke format PDF</p>
  </div>

  </div>
</header>

<main class="px-4 pt-6 max-w-5xl mx-auto">
  
<div class="bg-white p-6 rounded-2xl shadow border-t-4 border-blue-900 text-center">
  <div class="text-5xl mb-4">📄</div>
  <h3 class="font-bold text-gray-800 mb-2">Cetak Dokumen Visum</h3>
  <p class="text-xs text-gray-500 mb-6">Pilih bulan laporan yang ingin dicetak sebagai bukti kinerja dan pengajuan operasional.</p>
  
  <div class="text-left mb-4">
    <label class="text-xs font-bold text-gray-500 ml-2">PILIH BULAN CETAK</label>
    <select id="bulan-cetak" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600 mt-1 font-bold text-blue-900">
      <option value="01">Januari</option>
      <option value="02">Februari</option>
      <option value="03">Maret</option>
      <option value="04" selected>April</option>
      <option value="05">Mei</option>
      <option value="06">Juni</option>
      <option value="07">Juli</option>
      <option value="08">Agustus</option>
      <option value="09">September</option>
      <option value="10">Oktober</option>
      <option value="11">November</option>
      <option value="12">Desember</option>
    </select>
  </div>

  <button onclick="cetakPDFPerBulan()" class="w-full bg-blue-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-800 transition">
    🖨️ CETAK SEKARANG
  </button>
</div>

</main>
<script src="script.js"></script>
<script>
  // Pre-load data riwayat agar siap disaring
  loadRiwayat(); 
  cekLogin();
</script>
<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
  &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
  Aplikasi Pelaporan Kinerja PPKBD
</footer>
</body>
</html>
