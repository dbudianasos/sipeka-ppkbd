<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard SIPEKA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
    .nav-gradient { background: linear-gradient(135deg, #004a99 0%, #002d5f 100%); }
    .menu-card { transition: 0.3s; cursor: pointer; }
    .menu-card:hover { transform: translateY(-5px); }
  </style>
</head>

<body class="bg-slate-100 min-h-screen pb-10">

<!-- HEADER -->
<header class="nav-gradient p-6 rounded-b-[2.5rem] shadow-xl mb-6">
  <div class="flex justify-between items-center text-white">
    
    <div>
	  <p class="text-xs opacity-70">Selamat Datang</p>
	  <h1 id="namaUser" class="text-xl font-bold"></h1>
	  <p id="roleUser" class="text-sm opacity-80"></p>
	</div>

    <div class="flex gap-2">
      <button onclick="keProfil()" class="bg-white/20 p-2 rounded-xl">👤</button>
      <button onclick="logout()" class="bg-red-500 p-2 rounded-xl">❌</button>
    </div>

  </div>
</header>

<!-- CONTENT -->
<div class="px-4">

  <div class="bg-white p-4 rounded-2xl mb-6 shadow text-center">
    <p class="text-sm text-gray-500">Aplikasi Pelaporan Kinerja</p>
    <h2 class="text-lg font-bold text-blue-900">siPeKa PPKBD</h2>
  </div>

  <div id="menu-admin" style="display:none;" class="mb-6">
    <div class="bg-slate-200 p-3 rounded-2xl flex gap-3 shadow-inner">
      <div onclick="window.location.href='approve.html'" 
           class="menu-card flex-1 bg-yellow-100 p-3 rounded-xl text-center text-yellow-800 font-bold text-xs shadow-sm">
        ✔ Approve Laporan
      </div>
      <div onclick="window.location.href='user.html'" 
           class="menu-card flex-1 bg-green-100 p-3 rounded-xl text-center text-green-800 font-bold text-xs shadow-sm">
        👥 Manajemen User
      </div>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div onclick="keRenja()" class="menu-card bg-white p-5 rounded-2xl text-center shadow">
      <div class="text-3xl mb-2">📋</div>
      <p class="text-sm font-bold text-gray-700">Renja</p>
    </div>

    <div onclick="keLaporan()" class="menu-card bg-white p-5 rounded-2xl text-center shadow">
      <div class="text-3xl mb-2">📊</div>
      <p class="text-sm font-bold text-gray-700">Laporan</p>
    </div>

    <div onclick="window.location.href='monitoring.html'" class="menu-card bg-white p-5 rounded-2xl text-center shadow">
      <div class="text-3xl mb-2">📈</div>
      <p class="text-sm font-bold text-gray-700">Monitoring</p>
    </div>

    <div onclick="window.location.href='cetak.html'" class="menu-card bg-white p-5 rounded-2xl text-center shadow">
      <div class="text-3xl mb-2">🖨️</div>
      <p class="text-sm font-bold text-gray-700">Cetak</p>
    </div>
  </div>
  
  <div class="bg-white p-4 rounded-2xl mt-6 shadow">
    <h3 class="text-sm font-bold mb-3 text-center">Grafik Kinerja</h3>
    <canvas id="myChart"></canvas>
  </div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

<script>
  cekLogin();

  // tampilkan nama user
  document.getElementById("namaUser").innerText =
	  localStorage.getItem("nama");

	document.getElementById("roleUser").innerText =
	  localStorage.getItem("role");

  function keProfil() {
    window.location.href = "profil.html";
  }

  function keRenja() {
    window.location.href = "renja.html";
  }

  function keLaporan() {
    window.location.href = "laporan.html";
  }
  
  const role = localStorage.getItem("role");

if (role === "admin") {
  document.getElementById("menu-admin").style.display = "block";
}
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Fungsi untuk memuat grafik berdasarkan data asli kader
  function loadGrafik() {
    const nik = localStorage.getItem("nik");
    
    // Ubah teks sementara saat memuat
    const ctx = document.getElementById('myChart');
    
    fetch(API_URL + "?action=get_statistik&nik=" + nik)
      .then(res => res.json())
      .then(data => {
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: ['Pertemuan', 'Pencatatan', 'KIE', 'Pelayanan', 'Lainnya'],
            datasets: [{
              label: 'Realisasi Kegiatan Saya',
              // Mengambil angka asli dari Spreadsheet
              data: [data.Pertemuan, data.Pencatatan, data.KIE, data.Pelayanan, data.Lainnya],
              backgroundColor: '#1e3a8a', // Warna biru tua khas SIPEKA
              borderRadius: 6
            }]
          },
          options: { 
            responsive: true,
            scales: {
              y: { beginAtZero: true, ticks: { stepSize: 1 } } // Agar angkanya tidak desimal (1, 2, 3...)
            }
          }
        });
      })
      .catch(err => console.log("Gagal memuat grafik", err));
  }

  // Panggil fungsinya saat dashboard terbuka
  loadGrafik();
</script>

<footer class="text-center text-xs text-gray-400 mt-10">
  © Versi 0.1 - 2026 Dian UPTD PP Wil V
</footer>
</body>
</html>
