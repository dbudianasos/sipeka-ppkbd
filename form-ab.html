<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Register AB | siPeKa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
  
  <header class="sticky top-0 z-50 bg-blue-900 py-4 px-5 rounded-b-[1.5rem] shadow-lg text-white">
    <div class="flex items-center gap-3 max-w-5xl mx-auto">
      <button onclick="window.location.href='menu-lapbul.html'" class="bg-white/10 p-2 rounded-xl active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <div class="leading-tight">
        <h1 class="font-bold text-base uppercase tracking-wide">Input Register AB</h1>
        <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold">Pencapaian Peserta KB Baru (PPM)</p>
      </div>
    </div>
  </header>

  <main id="main-content" class="px-4 pt-6 max-w-3xl mx-auto hidden">
    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Bulan Laporan</label>
          <select id="ab-bulan" class="w-full p-3 text-xs bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900">
            <option value="JANUARI">Januari</option> <option value="FEBRUARI">Februari</option>
            <option value="MARET">Maret</option> <option value="APRIL">April</option>
            <option value="MEI">Mei</option> <option value="JUNI">Juni</option>
            <option value="JULI">Juli</option> <option value="AGUSTUS">Agustus</option>
            <option value="SEPTEMBER">September</option> <option value="OKTOBER">Oktober</option>
            <option value="NOVEMBER">November</option> <option value="DESEMBER">Desember</option>
          </select>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Tahun</label>
          <input type="number" id="ab-tahun" class="w-full p-3 text-xs bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900 text-center">
        </div>
        <div class="col-span-2">
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase tracking-widest">Pilih Desa Binaan</label>
          <select id="ab-desa" onchange="tarikTargetPPM()" class="w-full p-3 text-xs bg-white border-2 border-blue-100 rounded-xl outline-none font-black text-blue-900 uppercase">
            <option value="">-- Pilih Desa --</option>
          </select>
        </div>
      </div>
    </div>

    <div id="container-form-ab" class="hidden space-y-4">
      <div id="matriks-alkon"></div>

      <button onclick="simpanDataAB()" id="btn-simpan-ab" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-xl mt-6 uppercase tracking-[0.2em] text-xs active:scale-95 transition-all">
        SIMPAN DATA REGISTER
      </button>
    </div>
    
    <div id="pesan-tunggu" class="text-center py-20 hidden">
      <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Sinkronisasi Target PPM...</p>
    </div>
  </main>

  <script src="script.js"></script> 
  <script src="lapbul.js"></script>
</body>
</html>
