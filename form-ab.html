<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register AB (PPM) | siPeKa</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <header class="sticky top-0 z-50 bg-blue-900 py-4 px-5 rounded-b-[1.5rem] shadow-lg text-white flex justify-between items-center">
    <div class="flex items-center gap-3">
      <button onclick="window.location.href='menu-lapbul.html'" class="bg-white/10 p-2 rounded-xl active:scale-95 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <div class="leading-tight">
        <h1 class="font-bold text-base uppercase">Register AB</h1>
        <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold">Pencapaian Peserta KB Baru</p>
      </div>
    </div>
    
    <!-- TOMBOL AKSI (Simpan Draft & Realist) -->
    <div id="wadah-tombol-ab" class="flex gap-2">
      <!-- Muncul via JS -->
    </div>
  </header>

  <main class="px-4 pt-6 max-w-5xl mx-auto space-y-4">

    <!-- PANEL FILTER: TAHUN & BULAN BERDAMPINGAN, KECAMATAN DI BAWAH -->
<div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-4">
  
  <!-- Baris 1: Tahun dan Bulan -->
  <div class="flex gap-3">
    <div class="w-1/3">
      <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">1. Tahun</label>
      <select id="ab-tahun" onchange="initDataAB()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-black text-blue-900 uppercase text-xs">
        <!-- Dinamis via JS -->
      </select>
    </div>
    <div class="w-2/3">
      <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">2. Bulan Laporan</label>
      <select id="ab-bulan" onchange="initDataAB()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-black text-blue-900 uppercase text-xs">
        <option value="JANUARI">JANUARI</option>
        <option value="FEBRUARI">FEBRUARI</option>
        <option value="MARET">MARET</option>
        <option value="APRIL">APRIL</option>
        <option value="MEI">MEI</option>
        <option value="JUNI">JUNI</option>
        <option value="JULI">JULI</option>
        <option value="AGUSTUS">AGUSTUS</option>
        <option value="SEPTEMBER">SEPTEMBER</option>
        <option value="OKTOBER">OKTOBER</option>
        <option value="NOVEMBER">NOVEMBER</option>
        <option value="DESEMBER">DESEMBER</option>
      </select>
    </div>
  </div>

  <!-- Baris 2: Kecamatan -->
  <div>
    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">3. Kecamatan</label>
    <select id="ab-kecamatan" onchange="initDataAB()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-black text-blue-900 uppercase text-xs">
      <option value="">-- PILIH KECAMATAN --</option>
    </select>
  </div>

</div>

    <!-- STATUS BAR: RINGKASAN TARGET KECAMATAN -->
    <div id="status-bar-ab" class="hidden bg-white p-4 rounded-3xl shadow-sm border border-slate-100">
       <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3 text-center">📊 Akumulasi Target Kecamatan Bulan Ini</h3>
       <div id="indikator-target-bulan" class="grid grid-cols-4 md:grid-cols-7 gap-2">
         <!-- Generate via JS -->
       </div>
    </div>

    <!-- DAFTAR DESA (LACI/ACCORDION) -->
    <div id="container-laci-ab" class="space-y-3 pb-10">
      <!-- Laci Desa muncul di sini -->
    </div>

    <!-- LOADING & PESAN KOSONG -->
    <div id="loader-ab" class="hidden text-center py-20">
      <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
      <p class="text-[10px] font-bold text-slate-400 uppercase animate-pulse">Menghitung Distribusi Target...</p>
    </div>

  </main>

  <script src="script.js"></script>
  <script src="lapbul.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      cekLogin();
      // Kita panggil fungsi khusus AB agar tidak pusing
      if (typeof initKhususAB === "function") {
          setTimeout(initKhususAB, 500);
      }
    });
  </script>

  <footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
    &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
    Pencapaian Peserta KB Baru (AB)
  </footer>
</body>
</html>
