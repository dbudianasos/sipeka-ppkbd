<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengaturan Target & PKM | siPeKa</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <header class="sticky top-0 z-50 bg-slate-900 py-4 px-5 rounded-b-[1.5rem] shadow-lg text-white">
    <div class="flex items-center justify-between max-w-5xl mx-auto">
      <div class="flex items-center gap-3">
        <button onclick="window.location.href='menu-lapbul.html'" class="bg-white/10 p-2 rounded-xl active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        </button>
        <div class="leading-tight">
          <h1 class="font-bold text-base uppercase">Master Target</h1>
          <p class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Auto-Breakdown 50:50</p>
        </div>
      </div>
      <button onclick="simpanSemuaReferensi()" id="btn-save-ref" class="hidden bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black px-4 py-2 rounded-xl shadow-lg active:scale-95 transition uppercase tracking-widest">
        💾 Simpan
      </button>
    </div>
  </header>

  <main class="px-4 pt-6 max-w-4xl mx-auto">
    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-4">
      <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">1. Pilih Kecamatan</label>
      <select id="filter-kecamatan" onchange="tarikTargetPerKecamatan()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-black text-blue-900 uppercase">
        <option value="">-- PILIH KECAMATAN --</option>
        <option value="SETU">Kecamatan SETU</option>
      </select>
    </div>

    <div id="panel-target-kecamatan" class="hidden bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-4">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-[10px] font-black text-slate-800 uppercase tracking-widest">2. Input Target Dinas (PPM Kecamatan)</h3>
        <button onclick="hitungAutoDistribusi()" class="bg-slate-800 text-white text-[9px] font-bold px-3 py-1.5 rounded-lg active:scale-95 uppercase tracking-wider">⚡ Hitung Auto</button>
      </div>
      <div class="grid grid-cols-4 md:grid-cols-7 gap-2" id="input-target-dinas">
        </div>
    </div>

    <div id="panel-indikator" class="hidden bg-white p-4 rounded-3xl shadow-sm border border-slate-100 mb-4">
      <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Status Distribusi Target (Selisih)</h3>
      <div class="grid grid-cols-4 md:grid-cols-7 gap-2" id="wadah-indikator">
        </div>
    </div>

    <div id="panel-desa" class="hidden space-y-3">
      </div>

    <div id="loading-pesan" class="hidden text-center py-10">
      <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest animate-pulse">Menyiapkan Data...</p>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="lapbul.js"></script>

<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
  &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
  Aplikasi Pelaporan Kinerja PPKBD
</footer>
</body>
</html>
