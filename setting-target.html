<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengaturan Target & PKM | siPeKa</title>
  <title>Modul Lapbul | siPeKa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <header class="sticky top-0 z-50 bg-slate-900 py-4 px-5 rounded-b-[1.5rem] shadow-lg text-white">
    <div class="flex items-center gap-3 max-w-5xl mx-auto">
      <button onclick="window.location.href='menu-lapbul.html'" class="bg-white/10 p-2 rounded-xl active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <div class="leading-tight">
        <h1 class="font-bold text-base uppercase">Master Target & PKM</h1>
        <p class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Fondasi Data Bulanan</p>
      </div>
    </div>
  </header>

  <main class="px-4 pt-6 max-w-6xl mx-auto">
    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 mb-6">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-[10px] font-black text-blue-900 uppercase tracking-widest">📋 Data Referensi Desa</h3>
        <button onclick="simpanSemuaReferensi()" id="btn-save-ref" class="bg-blue-600 text-white text-[10px] font-black px-4 py-2 rounded-xl shadow-lg active:scale-95 transition uppercase">Simpan Perubahan</button>
      </div>

      <div class="overflow-x-auto relative">
        <table class="w-full text-[10px] border-collapse">
          <thead>
            <tr class="bg-slate-50 text-slate-400 uppercase">
              <th class="p-3 border-b text-left sticky left-0 bg-slate-50 border-r border-slate-100 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] z-20">Desa</th>
              <th class="p-3 border-b text-center min-w-[120px]">PKM</th>
              <th class="p-3 border-b text-center min-w-[100px]">Total PUS</th>
              <th class="p-3 border-b text-center min-w-[80px]">IUD</th>
              <th class="p-3 border-b text-center min-w-[80px]">MOW</th>
              <th class="p-3 border-b text-center min-w-[80px]">MOP</th>
              <th class="p-3 border-b text-center min-w-[80px]">KDM</th>
              <th class="p-3 border-b text-center min-w-[80px]">IMP</th>
              <th class="p-3 border-b text-center min-w-[80px]">STK</th>
              <th class="p-3 border-b text-center min-w-[80px]">PIL</th>
              <th class="p-3 border-b text-center min-w-[80px]">PPKBD</th>
            </tr>
          </thead>
          <tbody id="body-referensi">
            <tr><td colspan="11" class="p-10 text-center text-slate-400 italic animate-pulse">Menarik Data Master...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="text-center text-[10px] text-gray-400 mt-12 mb-4 italic px-10 leading-relaxed">
    &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
    Aplikasi Pelaporan Kinerja PPKBD
  </footer>

  <script src="script.js"></script>
  <script src="lapbul.js"></script>
</body>
</html>
