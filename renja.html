<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Rencana Kerja | siPeKa PPKBD</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family: 'Poppins', sans-serif; }
    /* Disamakan persis dengan warna dashboard */
    .nav-gradient { background: linear-gradient(135deg, #004a99 0%, #002d5f 100%); }
  </style>
</head>

<body class="bg-slate-100 min-h-screen pb-20">

<header class="sticky top-0 z-50 nav-gradient py-2.5 px-5 rounded-b-[1.5rem] shadow-lg shadow-blue-900/20 transition-all duration-300">
  <div class="flex items-center gap-3 max-w-5xl mx-auto text-white">
    
    <button onclick="window.location.href='dashboard.html'" 
            class="bg-white/10 hover:bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/10 transition active:scale-95 shadow-sm flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button>
    
    <div class="leading-tight">
      <h1 class="font-bold text-base md:text-lg tracking-wide">Rencana Kerja</h1>
      <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold mt-0.5">Susun target kegiatan tahunan</p>
  </div>
    
  </div>
</header>
  
<main class="px-4 pt-6 max-w-5xl mx-auto">  
  
<div class="bg-white p-6 rounded-2xl shadow mb-6 border-t-4 border-blue-900">
  <h3 class="font-bold text-md mb-4 text-gray-800">📋 Tambah Target Baru</h3>
  
  <div class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-bold text-gray-500">TAHUN</label>
        <input id="renja-tahun" type="number" value="2026" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500">BULAN</label>
        <select id="renja-bulan" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
          <option value="Januari">Januari</option>
          <option value="Februari">Februari</option>
          <option value="Maret">Maret</option>
          <option value="April">April</option>
          <option value="Mei">Mei</option>
          <option value="Juni">Juni</option>
          <option value="Juli">Juli</option>
          <option value="Agustus">Agustus</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="Desember">Desember</option>
        </select>
      </div>
    </div>

    <div class="mb-4">
      <label class="text-[10px] font-bold text-blue-900 uppercase ml-1">Jenis Kegiatan</label>
      <select id="renja-jenis" onchange="updateSubstansi(); generateIndikator()" class="w-full p-3 mt-1 bg-white border-2 border-blue-100 rounded-2xl focus:border-blue-500 outline-none shadow-sm text-sm">
        <option value="">-- Pilih Jenis Kegiatan --</option>
        <option value="Pertemuan">1. Pertemuan</option>
        <option value="KIE">2. KIE (Komunikasi, Informasi, Edukasi)</option>
        <option value="Pelayanan & Penggerakan">3. Pelayanan & Penggerakan</option>
        <option value="Pencatatan & Pelaporan">4. Pencatatan & Pelaporan</option>
        <option value="Lainnya">5. Lainnya</option>
      </select>
    </div>

    <div id="wrapper-substansi" class="mb-4 hidden">
      <label class="text-[10px] font-bold text-blue-900 uppercase ml-1">Substansi Kegiatan</label>
      <select id="renja-substansi" onchange="generateIndikator()" class="w-full p-3 mt-1 bg-white border-2 border-blue-100 rounded-2xl focus:border-blue-500 outline-none shadow-sm text-sm">
        </select>
    </div>

    <div class="mb-4">
      <label class="text-[10px] font-bold text-blue-900 uppercase ml-1">Keterangan Tambahan</label>
      <textarea id="renja-keterangan" rows="4" oninput="generateIndikator()" 
        placeholder="Contoh: Menjelaskan detail kegiatan atau agenda pertemuan..."
        class="w-full p-3 mt-1 bg-white border-2 border-blue-100 rounded-2xl focus:border-blue-500 outline-none shadow-sm text-sm transition-all"></textarea>
    </div>
    
    <div>
      <label id="label-sasaran" class="text-xs font-bold text-gray-500 uppercase">SASARAN / UNSUR PESERTA</label>
      <input id="renja-sasaran" type="text" oninput="generateIndikator()"
        placeholder="Contoh: PUS, Remaja, Lansia..." 
        class="w-full p-3 text-sm bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
    </div>
    
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-bold text-gray-500">TARGET VOLUME</label>
        <input id="renja-volume" type="number" placeholder="Berapa kali?" class="w-full p-3 text-sm placeholder:text-xs bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
      </div>
      <div>
        <label id="label-peserta" class="text-xs font-bold text-gray-500 uppercase">TARGET</label>
        <input id="renja-peserta" type="number" oninput="generateIndikator()"
          placeholder="Berapa orang?" 
          class="w-full p-3 text-sm bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
      </div>
    </div>

    <div class="mb-4">
      <div class="flex items-center justify-between mb-1">
        <label class="text-xs font-bold text-gray-500">INDIKATOR KEBERHASILAN</label>
        <span class="text-[9px] font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded-full flex items-center gap-1 border border-green-200">
          <span>✨</span> Otomatis
        </span>
      </div>
      <textarea id="renja-indikator" readonly rows="5"
          placeholder="Indikator akan terangkai otomatis di sini..." 
          class="w-full p-3 bg-slate-100 border border-slate-200 text-gray-600 rounded-2xl outline-none cursor-not-allowed font-medium text-sm leading-relaxed shadow-inner"></textarea>
      </div>

    <div>
      <label class="text-xs font-bold text-gray-500">LOKASI / DESA</label>
      <input id="renja-lokasi" type="text" placeholder="Lokasi kegiatan" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
    </div>

    <button onclick="simpanRenja()" id="btn-simpan-renja"
      class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-800 transition mt-2">
      SIMPAN RENCANA KERJA
    </button>
    <p id="info-renja" class="text-center text-sm mt-2 text-blue-600 font-bold"></p>
  </div>
</div>

<div>
  <h3 class="font-bold text-md mb-3 text-gray-800 ml-2">Daftar Renja Saya</h3>
  <div id="listRenja" class="space-y-3">
    <p class="text-center text-sm text-gray-500 italic py-4">Memuat data...</p>
  </div>
</div>
  
</main>
<script src="script.js"></script>
<script>
  cekLogin();
  // Langsung load daftar renja saat halaman dibuka
  loadRenja(); 
</script>
<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
  &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
  Aplikasi Pelaporan Kinerja PPKBD
</footer>
</body>
</html>
