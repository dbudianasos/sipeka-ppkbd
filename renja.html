<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Rencana Kerja SIPEKA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>

<body class="bg-slate-100 min-h-screen p-4 pb-20">

<script src="script.js"></script>

<div class="flex items-center mb-6 mt-2">
  <button onclick="window.location.href='dashboard.html'" 
    class="mr-4 bg-white p-2 rounded-xl shadow text-blue-900 font-bold">←</button>
  <div>
    <h2 class="text-xl font-bold text-blue-900">Rencana Kerja</h2>
    <p class="text-xs text-gray-500">Susun target kegiatan tahunan</p>
  </div>
</div>

<div class="bg-white p-6 rounded-2xl shadow mb-6 border-t-4 border-blue-900">
  <h3 class="font-bold text-md mb-4 text-gray-800">📋 Tambah Target Baru</h3>
  
  <div class="space-y-4">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-bold text-gray-500">TAHUN</label>
        <input id="renja-tahun" type="number" value="2026" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500">BULAN</label>
        <select id="renja-bulan" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
          <option value="Januari">Januari</option>
          <option value="Februari">Februari</option>
          <option value="Maret">Maret</option>
          <option value="April">April</option>
          <option value="Mei">Mei</option>
          <option value="Juni">Juni</option>
          <option value="Juli">Juli</option>
          <option value="Agustus">Agustus</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="Desember">Desember</option>
        </select>
      </div>
    </div>

    <div>
      <label class="text-xs font-bold text-gray-500">JENIS KEGIATAN</label>
      <select id="renja-kegiatan" class="w-full p-3 text-sm bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
        <option value="Pertemuan">Pertemuan</option>
        <option value="Pencatatan & Pelaporan">Pencatatan & Pelaporan</option>
        <option value="KIE">KIE (Komunikasi Informasi Edukasi)</option>
        <option value="Pelayanan & Penggerakan">Pelayanan & Penggerakan</option>
        <option value="Lainnya">Lainnya</option>
      </select>
    </div>

    <div>
      <label class="text-xs font-bold text-gray-500">SUBSTANSI / DETAIL KEGIATAN</label>
      <input id="renja-substansi" type="text" placeholder="Contoh: KIE PUS terkait PHBS, Rapat Rutin POS KB..." class="w-full p-3 text-sm placeholder:text-xs bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
    </div>

    <div>
      <label class="text-xs font-bold text-gray-500">SASARAN</label>
      <input id="renja-sasaran" type="text" placeholder="Contoh: PUS, Remaja, Lansia, Balita..." class="w-full p-3 text-sm placeholder:text-xs bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-bold text-gray-500">TARGET VOLUME</label>
        <input id="renja-volume" type="number" placeholder="Berapa kali?" class="w-full p-3 text-sm placeholder:text-xs bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500">TARGET PESERTA</label>
        <input id="renja-peserta" type="number" placeholder="Berapa orang?" class="w-full p-3 text-sm placeholder:text-xs bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
      </div>
    </div>

    <div>
      <label class="text-xs font-bold text-gray-500">INDIKATOR KEBERHASILAN</label>
      <input id="renja-indikator" type="text" placeholder="Contoh: 10 Akseptor Baru" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
    </div>

    <div>
      <label class="text-xs font-bold text-gray-500">LOKASI / DESA</label>
      <input id="renja-lokasi" type="text" placeholder="Lokasi kegiatan" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
    </div>

    <button onclick="simpanRenja()" id="btn-simpan-renja"
      class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-800 transition mt-2">
      SIMPAN RENCANA KERJA
    </button>
    <p id="info-renja" class="text-center text-sm mt-2 text-blue-600 font-bold"></p>
  </div>
</div>

<div>
  <h3 class="font-bold text-md mb-3 text-gray-800 ml-2">Daftar Renja Saya</h3>
  <div id="listRenja" class="space-y-3">
    <p class="text-center text-sm text-gray-500 italic py-4">Memuat data...</p>
  </div>
</div>

<script>
  cekLogin();
  // Langsung load daftar renja saat halaman dibuka
  loadRenja(); 
</script>

</body>
</html>
