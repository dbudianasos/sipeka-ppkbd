<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Validasi Laporan | siPeKa</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .nav-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); }
    .card-laporan { transition: all 0.2s; }
    .card-laporan:active { transform: scale(0.98); }
    select:disabled { background-color: #f1f5f9; cursor: not-allowed; color: #94a3b8; }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

<header class="sticky top-0 z-50 nav-gradient py-3 px-5 rounded-b-[1.5rem] shadow-lg shadow-blue-900/20">
  <div class="flex items-center justify-between max-w-5xl mx-auto text-white">
    <div class="flex items-center gap-3">
      <button onclick="window.location.href='dashboard-admin.html'" class="bg-white/10 p-2 rounded-xl border border-white/10 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <div>
        <h1 class="font-black text-sm uppercase tracking-widest">Validasi</h1>
        <p id="sub-title" class="text-[9px] text-blue-200 font-bold uppercase">Memuat Otoritas...</p>
      </div>
    </div>
    
    <div class="bg-yellow-400 text-blue-900 px-3 py-1 rounded-full font-black text-[10px] shadow-lg" id="count-pending">
      0 ANTRIAN
    </div>
  </div>
</header>

<main class="px-5 pt-6 max-w-5xl mx-auto">
  
  <div id="filter-area" class="mb-6 space-y-3">
    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
      <p class="text-[8px] font-black text-slate-400 uppercase mb-2 ml-1">Saring Antrian Berdasarkan Wilayah</p>
      <div class="flex gap-2">
        <select id="f-kecamatan" onchange="updateDesaFilter()" class="flex-1 text-[10px] p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900 outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">-- Semua Kecamatan --</option>
        </select>
        <select id="f-desa" onchange="applyFiltersLaporan()" class="flex-1 text-[10px] p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900 outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">-- Semua Desa --</option>
        </select>
      </div>
    </div>
  </div>

  <div id="listLaporan" class="space-y-4">
    <div class="flex flex-col items-center justify-center py-20 text-slate-300">
      <div class="text-5xl mb-4 animate-bounce">📁</div>
      <p class="text-xs font-bold uppercase tracking-widest">Memuat sistem...</p>
    </div>
  </div>

</main>

<script src="script.js"></script>
<script>
  let MASTER_WILAYAH = [];
  let DATA_LAPORAN_ALL = []; // Penampung data agar tidak perlu berkali-kali fetch

  window.onload = function() {
    cekLogin();
    const role = localStorage.getItem("role");
    
    if (!role.includes("admin")) {
      alert("Akses Khusus Admin!");
      window.location.href = "dashboard-kader.html";
      return;
    }

    const kec = localStorage.getItem("kecamatan");
    const desa = localStorage.getItem("desa");
    
    if (role === "super_admin") {
      document.getElementById("sub-title").innerText = "Otoritas: Kabupaten Bekasi";
    } else if (role === "admin_kec") {
      document.getElementById("sub-title").innerText = "Otoritas: Kec. " + kec;
    } else {
      document.getElementById("sub-title").innerText = "Otoritas: Desa " + desa;
      document.getElementById("filter-area").classList.add("hidden"); 
    }

    loadFilterWilayah();
  };

  // 1. FUNGSI TARIK MASTER WILAYAH
  function loadFilterWilayah() {
    fetch(`${API_URL}?action=get_wilayah_lengkap`)
      .then(res => res.json())
      .then(data => {
        MASTER_WILAYAH = data;
        const selKec = document.getElementById("f-kecamatan");
        const uniqueKec = [...new Set(data.map(item => item.nama_kec))].filter(k => k && k !== "-").sort();
        
        selKec.innerHTML = '<option value="">-- Semua Kecamatan --</option>';
        uniqueKec.forEach(k => selKec.innerHTML += `<option value="${k}">${k}</option>`);

        const role = localStorage.getItem("role");
        if(role === "admin_kec") {
          selKec.value = localStorage.getItem("kecamatan");
          selKec.disabled = true;
          updateDesaFilter(); 
        } else {
          loadLaporanDatabase(); 
        }
      })
      .catch(err => {
        console.error("Gagal load wilayah", err);
        loadLaporanDatabase(); 
      });
  }

  // 2. FUNGSI UPDATE DROPDOWN DESA
  function updateDesaFilter() {
    const kec = document.getElementById("f-kecamatan").value;
    const selDesa = document.getElementById("f-desa");
    
    selDesa.innerHTML = '<option value="">-- Semua Desa --</option>';
    const filtered = MASTER_WILAYAH.filter(item => item.nama_kec === kec);
    
    filtered.forEach(item => {
      if(item.nama_desa && item.nama_desa !== "-") {
        selDesa.innerHTML += `<option value="${item.nama_desa}">${item.nama_desa}</option>`;
      }
    });

    applyFiltersLaporan(); 
  }

  // 3. FUNGSI TARIK DATA LAPORAN 
  function loadLaporanDatabase() {
    const list = document.getElementById("listLaporan");
    const role = localStorage.getItem("role");
    const kec = localStorage.getItem("kecamatan"); // <--- Kemarin ini terlewat, makanya Admin Kec dapet 0
    const desa = localStorage.getItem("desa");

    list.innerHTML = `<div class="text-center py-20 text-blue-900 font-bold text-xs uppercase animate-pulse">⏳ Menarik Antrian...</div>`;

    // Pastikan &kec=${kec} masuk ke URL agar server tahu admin ini dari kecamatan mana
    fetch(`${API_URL}?action=get_pending_reports&role=${role}&kec=${kec}&desa=${desa}`)
      .then(res => res.json())
      .then(data => {
        DATA_LAPORAN_ALL = data;
        applyFiltersLaporan(); 
      })
      .catch(err => {
        list.innerHTML = `<div class="text-center py-20 text-red-400 font-bold text-xs uppercase">Gagal memuat data!</div>`;
      });
  }

  // 4. FUNGSI FILTER "SAPU JAGAT" (Versi Akurat NIK)
  function applyFiltersLaporan() {
    const list = document.getElementById("listLaporan");
    
    // Ambil nilai yang dipilih di dropdown
    const selKec = document.getElementById("f-kecamatan").value.toUpperCase();
    const selDesa = document.getElementById("f-desa").value.toUpperCase();

    const filteredData = DATA_LAPORAN_ALL.filter(item => {
      let passFilter = true;

      // Cek dengan data kecamatan_kader dan desa_kader yang ditarik server tadi
      if (selKec !== "" && item.kecamatan_kader !== selKec) {
        passFilter = false;
      }
      if (selDesa !== "" && item.desa_kader !== selDesa) {
        passFilter = false;
      }

      return passFilter;
    });

    // --- RENDER DOM (Sama seperti sebelumnya) ---
    document.getElementById("count-pending").innerText = filteredData.length + " ANTRIAN";
    
    if (filteredData.length === 0) {
      list.innerHTML = `<div class="text-center py-20 text-slate-400 font-bold text-xs uppercase italic">☕ Tidak ada antrian untuk wilayah ini</div>`;
      return;
    }

    list.innerHTML = "";
    filteredData.forEach(item => {
      const thumbFoto = item.file_id && item.file_id !== "-" ? `https://drive.google.com/thumbnail?id=${item.file_id}&sz=w800` : "";
      const linkAsli = item.file_id && item.file_id !== "-" ? `https://drive.google.com/uc?id=${item.file_id}` : "#";

      list.innerHTML += `
        <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden card-laporan mb-4">
          <div class="p-5">
            <div class="flex justify-between items-start mb-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-50 rounded-2xl flex items-center justify-center text-xl shadow-inner">👤</div>
                <div>
                  <h4 class="font-black text-slate-800 text-xs uppercase tracking-tight">${item.nama_kader}</h4>
                  <p class="text-[9px] font-bold text-slate-400 uppercase">📍 ${item.lokasi} | ${item.tanggal}</p>
                </div>
              </div>
              <div class="bg-yellow-100 text-yellow-700 text-[8px] font-black px-2 py-1 rounded-lg uppercase">PENDING</div>
            </div>

            <div class="bg-slate-50 p-4 rounded-2xl mb-4 space-y-2">
              <div>
                <p class="text-[8px] font-black text-slate-400 uppercase">Kegiatan:</p>
                <p class="text-xs font-bold text-slate-700">${item.kegiatan}</p>
              </div>
              <div>
                <p class="text-[8px] font-black text-slate-400 uppercase">Realisasi:</p>
                <p class="text-xs font-black text-blue-900">${item.realisasi}</p>
              </div>
            </div>

            ${thumbFoto ? `
              <div class="mb-4">
                <img src="${thumbFoto}" class="w-full h-48 object-cover rounded-2xl border-2 border-slate-50 shadow-sm" 
                     onerror="this.src='https://placehold.co/400x200?text=Memuat+Gambar...'"
                     onclick="window.open('${linkAsli}', '_blank')">
                <p class="text-[8px] text-center text-slate-400 mt-2 font-bold italic">Klik foto untuk melihat ukuran penuh</p>
              </div>
            ` : `<div class="bg-slate-100 py-4 rounded-2xl text-center text-[10px] text-slate-400 mb-4 font-bold">TIDAK ADA BUKTI FOTO</div>`}

            <div class="grid grid-cols-2 gap-3">
              <button onclick="prosesApprove('${item.id}', 'REJECT')" class="bg-red-50 text-red-600 font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest border border-red-100 active:scale-95 transition">Tolak</button>
              <button onclick="prosesApprove('${item.id}', 'APPROVED')" class="bg-blue-900 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest shadow-lg shadow-blue-900/20 active:scale-95 transition">Terima</button>
            </div>
          </div>
        </div>`;
    });
  }

  // 5. FUNGSI TERIMA / TOLAK
  function prosesApprove(id, status) {
    const confirmText = status === 'APPROVED' ? "Terima laporan ini?" : "Tolak laporan ini?";
    if (!confirm(confirmText)) return;

    document.getElementById("listLaporan").innerHTML = `<div class="text-center py-20 animate-pulse text-blue-900 font-black uppercase text-[10px]">Memproses Validasi...</div>`;

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "process_approval",
        id_laporan: id,
        status_baru: status,
        admin_nama: localStorage.getItem("nama")
      })
    })
    .then(res => res.text())
    .then(res => {
      if (res === "success") {
        loadLaporanDatabase(); // Tarik data baru setelah diubah
      } else {
        alert("Gagal: " + res);
        loadLaporanDatabase();
      }
    });
  }
</script>
</body>
</html>
