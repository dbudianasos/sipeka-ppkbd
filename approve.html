<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Approve Laporan | siPeKa PPKBD</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family: 'Poppins', sans-serif; }
    /* Disamakan persis dengan warna dashboard */
    .nav-gradient { background: linear-gradient(135deg, #004a99 0%, #002d5f 100%); }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

<header class="sticky top-0 z-50 nav-gradient py-2.5 px-5 rounded-b-[1.5rem] shadow-lg shadow-blue-900/20 transition-all duration-300">
  <div class="flex items-center gap-3 max-w-5xl mx-auto text-white">
    
    <button onclick="window.location.href='dashboard.html'" 
            class="bg-white/10 hover:bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/10 transition active:scale-95 shadow-sm flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button>

    <div class="leading-tight">
      <h1 class="font-bold text-base md:text-lg tracking-wide">Approve Laporan</h1>
      <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold mt-0.5">Verifikasi Kinerja Kader</p>
    </div>

  </div>
</header>

<main class="px-4 pt-6 max-w-5xl mx-auto">
  
<div class="px-4">
  <div id="listLaporan" class="space-y-4">
    <p class="text-center text-gray-400 text-sm py-10 italic">Memuat data laporan...</p>
  </div>
</div>

<footer class="text-center text-[10px] text-gray-400 mt-10">
  © Versi 0.1 - 2026 Dian UPTD PP Wil V
</footer>
</main>
<script src="script.js"></script>
<script>
  // Keamanan Akses
  cekLogin();
  if (localStorage.getItem("role") !== "admin") {
      alert("Akses Ditolak! Menu ini khusus Admin.");
      window.location.href = "dashboard.html";
  }

  // Load Data
  loadLaporan();
</script>
<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
  &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
  Aplikasi Pelaporan Kinerja PPKBD
</footer>
</body>
</html>
