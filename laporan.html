<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Laporan | siPeKa PPKBD</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family: 'Poppins', sans-serif; }
    /* Disamakan persis dengan warna dashboard */
    .nav-gradient { background: linear-gradient(135deg, #004a99 0%, #002d5f 100%); }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

<header class="sticky top-0 z-50 nav-gradient py-2.5 px-5 rounded-b-[1.5rem] shadow-lg shadow-blue-900/20 transition-all duration-300">
  <div class="flex items-center gap-3 max-w-5xl mx-auto text-white">
    
    <button onclick="window.location.href='dashboard.html'" 
            class="bg-white/10 hover:bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/10 transition active:scale-95 shadow-sm flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button>

    <div class="leading-tight">
      <h1 class="font-bold text-base md:text-lg tracking-wide">Buat Laporan</h1>
      <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold mt-0.5">Input Realisasi Kegiatan</p>
    </div>

  </div>
</header>
<main class="px-4 pt-6 max-w-5xl mx-auto">
<div class="px-4">
  <div class="bg-white p-6 rounded-2xl shadow mb-6 border-t-4 border-blue-900">
  
    <div class="space-y-6">
      
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Tanggal</label>
          <input id="lap-tgl" type="date" onchange="bukaKunciForm()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-inner">
        </div>

        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Sumber Laporan</label>
          <select id="sumber-kegiatan" onchange="toggleAreaForm()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-inner disabled:opacity-50">
            <option value="renja">Sesuai Renja</option>
            <option value="luar">Luar Renja</option>
          </select>
        </div>
      </div>

      <fieldset id="area-lanjutan" disabled class="space-y-6 opacity-40 transition-opacity duration-500">
        
        <div id="pesan-kunci" class="text-center bg-red-50 text-red-500 text-[10px] font-bold p-2 rounded-xl uppercase tracking-widest animate-pulse border border-red-100">
          👆 Pilih Tanggal Terlebih Dahulu
        </div>

        <div id="area-pilih-renja" class="p-4 bg-blue-50/50 rounded-2xl border border-blue-100 space-y-4">
          <div>
            <label class="text-[10px] font-bold text-blue-800 uppercase tracking-widest ml-2 mb-1 block">Pilih Rencana Kerja</label>
            <select id="pilih-renja" onchange="validasiFotoLaporan()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-sm">
              <option value="">-- Memuat Renja Anda... --</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-bold text-blue-800 uppercase tracking-widest ml-2 mb-1 block">Catatan Tambahan (Opsional)</label>
            <input id="lap-catatan-renja" type="text" placeholder="Kendala/Kondisi lapangan..." class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-sm">
          </div>
        </div>

        <div id="area-manual" class="p-4 bg-amber-50/50 rounded-2xl border border-amber-100 space-y-4" style="display:none;">
  
          <div>
            <label class="text-[10px] font-bold text-amber-800 uppercase tracking-widest ml-2 mb-1 block">Jenis Kegiatan Luar Renja</label>
            <select id="lap-kegiatan" onchange="updateSubstansiLaporan(); validasiFotoLaporan()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-amber-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 transition-all shadow-sm">
                <option value="">-- Pilih Jenis Kegiatan --</option>
                <option value="Pertemuan">1. Pertemuan</option>
                <option value="KIE">2. KIE (Komunikasi, Informasi, Edukasi)</option>
                <option value="Pelayanan & Penggerakan">3. Pelayanan & Penggerakan</option>
                <option value="Pencatatan & Pelaporan">4. Pencatatan & Pelaporan</option>
                <option value="Lainnya">5. Lainnya</option>
            </select>
          </div>
        
          <div id="wrapper-substansi-lap" class="hidden">
            <label class="text-[10px] font-bold text-amber-800 uppercase tracking-widest ml-2 mb-1 block">Substansi Kegiatan</label>
            <select id="lap-substansi" onchange="validasiFotoLaporan()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-amber-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 transition-all shadow-sm">
              </select>
          </div>
        
          <div id="wrapper-keterangan-lap" class="hidden">
            <label id="label-lap-keterangan" class="text-[10px] font-bold text-amber-800 uppercase tracking-widest ml-2 mb-1 block">Dasar Pelaksanaan / Keterangan</label>
            <input id="lap-keterangan" type="text" placeholder="Misal: Instruksi Kades / Undangan Bidan..." class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-amber-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 transition-all placeholder:font-normal shadow-sm">
          </div>
        
        </div>
        
        </div>

        <div class="grid grid-cols-3 gap-3">
          <div class="col-span-2">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Lokasi / Tempat</label>
            <input id="lap-lokasi" oninput="validasiFotoLaporan()" type="text" placeholder="Desa / Posyandu..." class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
          </div>
          <div class="col-span-1">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Realisasi</label>
            <input id="lap-realisasi" type="number" placeholder="0" class="w-full p-4 text-xl text-center font-black text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
            <p id="satuan-realisasi" class="text-[9px] text-center font-bold text-blue-500 mt-1 uppercase"></p>
          </div>
        </div>

        <div class="pt-2">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-2 block">Upload Foto Visum (Wajib)</label>
          <input type="file" id="lap-foto-file" accept="image/*" class="hidden" onchange="previewFoto(this)">
          
          <div id="area-foto-klik" onclick="bukaKamera()" 
               class="w-full p-8 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2rem] text-center cursor-pointer opacity-30 pointer-events-none transition-all group">
              
              <div id="ikon-kamera" class="text-4xl mb-2">🔒</div>
              <span id="label-foto" class="text-[10px] text-gray-400 font-bold tracking-wide block">Isi Tanggal, Lokasi & Kegiatan dulu</span>
              
              <img id="img-preview" class="hidden mt-4 mx-auto rounded-xl max-h-48 object-cover shadow-md border-4 border-white">
          </div>
        </div>

        <div class="pt-2">
          <button onclick="simpanLaporan()" id="btn-simpan-laporan"
            class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-900/20 hover:bg-blue-800 active:scale-95 transition-all tracking-widest text-sm uppercase disabled:bg-gray-400">
            Kirim Laporan
          </button>
          <p id="info-laporan" class="text-center text-xs mt-3 font-bold min-h-[1rem] text-red-500"></p>
        </div>

      </fieldset> </div>
  </div>
</div>
</main>
  
<script src="script.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    batasiTanggalLaporan(); // Memastikan tanggal maksimal hari ini
    // Memastikan jika ada data renja lama langsung ter-load
    if (typeof loadRenjaUntukLaporan === "function") {
       loadRenjaUntukLaporan();
    }
  });
</script>
  
<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
  &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
  Aplikasi Pelaporan Kinerja PPKBD
</footer>
</body>
</html>
