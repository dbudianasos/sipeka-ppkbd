<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Laporan | siPeKa PPKBD</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .bg-gradient-biru { background: linear-gradient(135deg, #002d5f 0%, #001a38 100%); }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

<script src="script.js"></script>

<header class="bg-gradient-biru pt-8 pb-8 px-6 rounded-b-[2.5rem] shadow-xl mb-6">
  <div class="flex items-center gap-4 text-white">
    <button onclick="window.location.href='dashboard.html'" class="bg-white/20 hover:bg-white/30 p-3 rounded-2xl transition active:scale-95 shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
    </button>
    <div>
      <h2 class="text-2xl font-black tracking-tight leading-tight">Buat Laporan</h2>
      <p class="text-[10px] text-blue-200 uppercase tracking-widest font-bold mt-1">Input Realisasi Kegiatan</p>
    </div>
  </div>
</header>

<div class="px-4">
  <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
    <div class="space-y-6">
      
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Tanggal</label>
          <input id="lap-tgl" type="date" onchange="bukaKunciForm()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-inner">
        </div>

        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Sumber Laporan</label>
          <select id="sumber-kegiatan" onchange="toggleAreaForm()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-inner disabled:opacity-50">
            <option value="renja">Sesuai Renja</option>
            <option value="luar">Luar Renja</option>
          </select>
        </div>
      </div>

      <fieldset id="area-lanjutan" disabled class="space-y-6 opacity-40 transition-opacity duration-500">
        
        <div id="pesan-kunci" class="text-center bg-red-50 text-red-500 text-[10px] font-bold p-2 rounded-xl uppercase tracking-widest animate-pulse border border-red-100">
          👆 Pilih Tanggal Terlebih Dahulu
        </div>

        <div id="area-pilih-renja" class="p-4 bg-blue-50/50 rounded-2xl border border-blue-100 space-y-4">
          <div>
            <label class="text-[10px] font-bold text-blue-800 uppercase tracking-widest ml-2 mb-1 block">Pilih Rencana Kerja</label>
            <select id="pilih-renja" class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-sm">
              <option value="">-- Memuat Renja Anda... --</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-bold text-blue-800 uppercase tracking-widest ml-2 mb-1 block">Catatan Tambahan (Opsional)</label>
            <input id="lap-catatan-renja" type="text" placeholder="Kendala/Kondisi lapangan..." class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 transition-all shadow-sm">
          </div>
        </div>

        <div id="area-manual" class="p-4 bg-amber-50/50 rounded-2xl border border-amber-100 space-y-4" style="display:none;">
  
          <div>
            <label class="text-[10px] font-bold text-amber-800 uppercase tracking-widest ml-2 mb-1 block">Jenis Kegiatan Luar Renja</label>
            <select id="lap-kegiatan" onchange="updateSubstansiLaporan()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-amber-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 transition-all shadow-sm">
                <option value="">-- Pilih Jenis Kegiatan --</option>
                <option value="Pertemuan">1. Pertemuan</option>
                <option value="KIE">2. KIE (Komunikasi, Informasi, Edukasi)</option>
                <option value="Pelayanan & Penggerakan">3. Pelayanan & Penggerakan</option>
                <option value="Pencatatan & Pelaporan">4. Pencatatan & Pelaporan</option>
                <option value="Lainnya">5. Lainnya</option>
            </select>
          </div>
        
          <div id="wrapper-substansi-lap" class="hidden">
            <label class="text-[10px] font-bold text-amber-800 uppercase tracking-widest ml-2 mb-1 block">Substansi Kegiatan</label>
            <select id="lap-substansi" class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-amber-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 transition-all shadow-sm">
              </select>
          </div>
        
          <div id="wrapper-keterangan-lap" class="hidden">
            <label id="label-lap-keterangan" class="text-[10px] font-bold text-amber-800 uppercase tracking-widest ml-2 mb-1 block">Dasar Pelaksanaan / Keterangan</label>
            <input id="lap-keterangan" type="text" placeholder="Misal: Instruksi Kades / Undangan Bidan..." class="w-full p-4 text-sm font-semibold text-blue-900 bg-white border border-amber-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 transition-all placeholder:font-normal shadow-sm">
          </div>
        
        </div>
        
        </div>

        <div class="grid grid-cols-3 gap-3">
          <div class="col-span-2">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Lokasi / Tempat</label>
            <input id="lap-lokasi" type="text" placeholder="Desa / Posyandu..." class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
          </div>
          <div class="col-span-1">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Peserta</label>
            <input id="lap-realisasi" type="number" placeholder="Angka" class="w-full p-4 text-xl text-center font-black text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
          </div>
        </div>

        <div class="pt-2">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-2 block">Upload Foto Visum (Wajib)</label>
          <input type="file" id="lap-foto-file" accept="image/*" capture="environment" class="hidden" onchange="previewFoto(this)">
          <div onclick="document.getElementById('lap-foto-file').click()" 
               class="w-full p-8 bg-blue-50/50 border-2 border-dashed border-blue-200 rounded-[2rem] text-center cursor-pointer hover:bg-blue-50 transition-all active:scale-95 group">
              <div id="ikon-kamera" class="text-4xl mb-2 group-hover:scale-110 transition-transform">📸</div>
              <span id="label-foto" class="text-xs text-blue-800 font-bold tracking-wide">Ambil/Pilih Foto</span>
              <img id="img-preview" class="hidden mt-4 mx-auto rounded-xl max-h-48 object-cover shadow-md border-4 border-white">
          </div>
        </div>

        <div class="pt-2">
          <button onclick="simpanLaporan()" id="btn-simpan-laporan"
            class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-900/20 hover:bg-blue-800 active:scale-95 transition-all tracking-widest text-sm uppercase disabled:bg-gray-400">
            Kirim Laporan
          </button>
          <p id="info-laporan" class="text-center text-xs mt-3 font-bold min-h-[1rem] text-red-500"></p>
        </div>

      </fieldset> </div>
  </div>
</div>

<script>
  function toggleAreaForm() {
    const sumber = document.getElementById("sumber-kegiatan").value;
    const areaRenja = document.getElementById("area-pilih-renja");
    const areaManual = document.getElementById("area-manual");
    if(sumber === "luar") {
        areaRenja.style.display = "none";
        areaManual.style.display = "block";
    } else {
        areaRenja.style.display = "block";
        areaManual.style.display = "none";
    }
  }

  // Set default saat pertama kali buka
  toggleAreaForm();

  // FUNGSI UNTUK MEMBUKA KUNCI FORM SAAT TANGGAL DIPILIH
  function bukaKunciForm() {
    const tglInput = document.getElementById("lap-tgl").value;
    const today = new Date().toISOString().split('T')[0];
    const areaLanjutan = document.getElementById("area-lanjutan");
    const pesanKunci = document.getElementById("pesan-kunci");
    const dropdownSumber = document.getElementById("sumber-kegiatan");

    if (tglInput) {
      // Buka kunci fieldset & hilangkan efek buram
      areaLanjutan.removeAttribute("disabled");
      areaLanjutan.classList.remove("opacity-40");
      dropdownSumber.removeAttribute("disabled"); // Buka kunci sumber kegiatan

      // Sembunyikan pesan merah
      if(pesanKunci) pesanKunci.style.display = "none";

      // Pengecekan Tambahan: Jika input tanggal lebih besar dari hari ini
      if (tglInput > today) {
        alert("Maaf Pak/Bu, tidak boleh melaporkan kegiatan untuk tanggal masa depan.");
        document.getElementById("lap-tgl").value = ""; // Kosongkan kembali
        return;
      }
      
      // Panggil fungsi filter renja dari script.js
      if(typeof filterRenjaBerdasarkanTanggal === "function") {
        filterRenjaBerdasarkanTanggal();
      }
    } else {
      // Kunci kembali jika tanggal dihapus
      areaLanjutan.setAttribute("disabled", "true");
      areaLanjutan.classList.add("opacity-40");
      dropdownSumber.setAttribute("disabled", "true");
      if(pesanKunci) pesanKunci.style.display = "block";
    }
  }
</script>
</body>
</html>
