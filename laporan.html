<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Input Laporan | siPeKa PPKBD</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .bg-gradient-biru { background: linear-gradient(135deg, #002d5f 0%, #001a38 100%); }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

<script src="script.js"></script>

<header class="bg-gradient-biru pt-8 pb-8 px-6 rounded-b-[2.5rem] shadow-xl mb-6">
  <div class="flex items-center gap-4 text-white">
    <button onclick="window.location.href='dashboard.html'" class="bg-white/20 hover:bg-white/30 p-3 rounded-2xl transition active:scale-95 shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
    </button>
    
    <div>
      <h2 class="text-2xl font-black tracking-tight leading-tight">Buat Laporan</h2>
      <p class="text-[10px] text-blue-200 uppercase tracking-widest font-bold mt-1">Input Realisasi Kegiatan</p>
    </div>
  </div>
</header>

<div class="px-4">
  <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
    <div class="space-y-5">
      
      <div>
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Sumber Kegiatan</label>
        <select id="sumber-kegiatan" onchange="toggleRenjaSelector()" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
          <option value="renja">Sesuai Rencana Kerja (Renja)</option>
          <option value="luar">Kegiatan Tambahan (Luar Renja)</option>
        </select>
      </div>

      <div id="area-pilih-renja">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Pilih Rencana Kerja</label>
        <select id="pilih-renja" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
          <option value="">-- Memuat Renja Anda... --</option>
        </select>
      </div>

      <div id="area-manual" class="space-y-5">
        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Jenis Kegiatan</label>
          <select id="lap-kegiatan" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
              <option value="Pertemuan">Pertemuan</option>
              <option value="Pencatatan & Pelaporan">Pencatatan & Pelaporan</option>
              <option value="KIE">KIE</option>
              <option value="Pelayanan & Penggerakan">Pelayanan & Penggerakan</option>
              <option value="Lainnya">Lainnya</option>
          </select>
        </div>
        
        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Substansi / Detail</label>
          <input id="lap-substansi" type="text" placeholder="Jelaskan detail kegiatan..." class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all placeholder:font-normal">
        </div>

        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Lokasi Kegiatan</label>
          <input id="lap-lokasi" type="text" placeholder="Contoh: Desa Lubangbuaya" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all placeholder:font-normal">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Tanggal</label>
          <input id="lap-tgl" type="date" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all">
        </div>
        <div>
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-1 block">Realisasi (Orang)</label>
          <input id="lap-realisasi" type="number" placeholder="Jml Peserta" class="w-full p-4 text-sm font-semibold text-blue-900 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all placeholder:font-normal">
        </div>
      </div>

      <div class="pt-2">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2 mb-2 block">Upload Foto Visum (Wajib)</label>
        <input type="file" id="lap-foto-file" accept="image/*" capture="environment" class="hidden" onchange="previewFoto(this)">
        
        <div onclick="document.getElementById('lap-foto-file').click()" 
             class="w-full p-8 bg-blue-50/50 border-2 border-dashed border-blue-200 rounded-[2rem] text-center cursor-pointer hover:bg-blue-50 transition-all active:scale-95 group">
            
            <div id="ikon-kamera" class="text-4xl mb-2 group-hover:scale-110 transition-transform">📸</div>
            <span id="label-foto" class="text-xs text-blue-800 font-bold tracking-wide">Ambil atau Pilih Foto</span>
            
            <img id="img-preview" class="hidden mt-4 mx-auto rounded-xl max-h-48 object-cover shadow-md border-4 border-white">
        </div>
        <p class="text-[9px] text-gray-400 mt-2 text-center font-medium">*Foto akan diotomatisasi kompresinya agar hemat kuota.</p>
      </div>

      <div class="pt-4">
        <button onclick="simpanLaporan()" id="btn-simpan-laporan"
          class="w-full bg-blue-900 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-900/20 hover:bg-blue-800 active:scale-95 transition-all tracking-widest text-sm uppercase">
          Kirim Laporan
        </button>
        <p id="info-laporan" class="text-center text-xs mt-3 font-bold min-h-[1rem]"></p>
      </div>

    </div>
  </div>
</div>

<script>
  // Cek apakah user sudah login
  if (typeof cekLogin === "function") { cekLogin(); }
  
  // Jika fungsi loadRenjaUntukLaporan ada di script.js, jalankan
  if (typeof loadRenjaUntukLaporan === "function") { loadRenjaUntukLaporan(); }

  // Logika Sembunyikan/Tampilkan Dropdown Renja
  function toggleRenjaSelector() {
    const sumber = document.getElementById("sumber-kegiatan").value;
    const areaRenja = document.getElementById("area-pilih-renja");
    
    // Asumsi: jika pilih Renja, form manual (kegiatan, substansi, lokasi) mungkin otomatis terisi, 
    // tapi biarkan terbuka agar bisa diubah. 
    if(sumber === "luar") {
        areaRenja.style.display = "none";
    } else {
        areaRenja.style.display = "block";
    }
  }

  // Set default form state
  toggleRenjaSelector();
</script>

</body>
</html>
