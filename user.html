<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Manajemen User | siPeKa</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .nav-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); }
    input:disabled, select:disabled { background-color: #f1f5f9; cursor: not-allowed; color: #94a3b8; }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">
  <header class="sticky top-0 z-50 nav-gradient py-2.5 px-5 rounded-b-[1.5rem] shadow-lg">
    <div class="flex items-center gap-3 max-w-5xl mx-auto text-white">
      <button onclick="window.location.href='dashboard-admin.html'" class="bg-white/10 p-2 rounded-xl border border-white/10 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <div class="leading-tight">
        <h1 class="font-bold text-base uppercase">Manajemen User</h1>
        <p id="sub-title-admin" class="text-[9px] text-blue-200 uppercase tracking-widest font-bold mt-0.5">Memproses Otoritas...</p>
      </div>
    </div>
  </header>

  <main class="px-4 pt-6 max-w-5xl mx-auto">
    <div class="bg-white p-6 rounded-[2rem] shadow-sm border-t-4 border-blue-900 mb-8">
      <div class="flex justify-between items-center mb-5">
        <h3 id="form-title" class="font-bold text-sm text-slate-800">👤 Registrasi Akun Baru</h3>
        <button id="btn-batal-edit" onclick="batalEdit()" class="hidden bg-slate-100 text-slate-600 px-3 py-1 text-[9px] font-bold rounded-lg border border-slate-200 active:scale-95">BATAL EDIT</button>
      </div>
      
      <input type="hidden" id="edit-nik-target" value="">
      <div class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Nama Lengkap</label>
            <input id="user-nama" type="text" placeholder="Sesuai KTP" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none">
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">NIK (16 Digit)</label>
            <input id="user-nik" type="number" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none">
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Kecamatan</label>
            <select id="user-kecamatan" onchange="updateDropdownDesa()" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900">
              <option value="">-- Pilih Kecamatan --</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Desa / Wilayah</label>
            <select id="user-wilayah" onchange="evaluasiRoleOtomatis()" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900">
              <option value="">-- Pilih Desa --</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Jabatan (Role)</label>
            <select id="user-role" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900"></select>
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">No. WhatsApp</label>
            <input id="user-hp" type="number" placeholder="0812..." class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none">
          </div>
        </div>
        <input id="user-password" type="hidden" value="123456">
        <button onclick="tambahUser()" id="btn-tambah-user" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-lg mt-4 uppercase tracking-widest text-xs active:scale-95">Simpan Data Pengguna</button>
        <p id="info-user" class="text-center text-[10px] mt-2 font-bold"></p>
      </div>
    </div>

    <div class="mt-10 mb-10">
    <div class="flex justify-between items-center mb-4 px-2">
      <h3 class="font-bold text-xs text-slate-800 uppercase tracking-tighter">📋 User Terdaftar</h3>
      <button onclick="loadUsers()" class="text-blue-600 text-[10px] font-black uppercase tracking-widest bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 active:scale-95 transition">🔄 Refresh</button>
    </div>
  
    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 mb-4 space-y-3">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">🔍</span>
        <input type="text" id="search-user" oninput="applyFilters()" placeholder="Cari Nama atau NIK..." 
               class="w-full pl-10 pr-4 py-3 text-xs bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 font-bold uppercase">
      </div>
      
      <div class="grid grid-cols-2 gap-2">
        <select id="filter-role" onchange="applyFilters()" class="p-3 text-[10px] font-bold bg-slate-50 border border-slate-100 rounded-xl outline-none text-blue-900 uppercase">
          <option value="">Semua Role</option>
          </select>
        
        <select id="filter-wilayah" onchange="applyFilters()" class="p-3 text-[10px] font-bold bg-slate-50 border border-slate-100 rounded-xl outline-none text-blue-900 uppercase">
          <option value="">Semua Wilayah</option>
        </select>
      </div>
      
    </div>
  
    <div id="container-daftar-user" class="space-y-3">
      <p class="text-center text-[10px] text-slate-400 py-10 italic">Sedang menyinkronkan data...</p>
    </div>
  </div>
  </main>

  <script src="script.js"></script>
  <script>
    cekLogin();
    window.onload = function() {
      if (typeof loadWilayahDatabase === 'function') loadWilayahDatabase();
      if (typeof loadUsers === 'function') loadUsers();
    };
  </script>
</body>
</html>
