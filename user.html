<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Manajemen User | siPeKa PPKBD</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .nav-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); }
    input:disabled, select:disabled { background-color: #f1f5f9; cursor: not-allowed; color: #94a3b8; }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

  <header class="sticky top-0 z-50 nav-gradient py-2.5 px-5 rounded-b-[1.5rem] shadow-lg shadow-blue-900/20">
    <div class="flex items-center gap-3 max-w-5xl mx-auto text-white">
      <button onclick="window.location.href='dashboard-admin.html'" 
              class="bg-white/10 hover:bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/10 transition active:scale-95 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>

      <div class="leading-tight">
        <h1 class="font-bold text-base md:text-lg tracking-wide uppercase">Manajemen User</h1>
        <p id="sub-title-admin" class="text-[9px] text-blue-200 uppercase tracking-widest font-bold mt-0.5">Otoritas Wilayah ...</p>
      </div>
    </div>
  </header>

  <main class="px-4 pt-6 max-w-5xl mx-auto">
  <div class="bg-white p-6 rounded-[2rem] shadow-sm border-t-4 border-blue-900 mb-8">
    <h3 class="font-bold text-sm mb-5 text-slate-800 flex items-center gap-2">
      <span>👤</span> Form Registrasi Akun Baru
    </h3>
    
    <div class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Nama Lengkap</label>
          <input id="user-nama" type="text" placeholder="Nama sesuai KTP" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none">
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">NIK (16 Digit)</label>
          <input id="user-nik" type="number" placeholder="ID Login User" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Kecamatan</label>
          <select id="user-kecamatan" onchange="updateDropdownDesa()" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900">
            <option value="">-- Pilih Kecamatan --</option>
          </select>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Desa / Wilayah</label>
          <select id="user-wilayah" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900">
            <option value="">-- Pilih Desa --</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">Jabatan (Role)</label>
          <select id="user-role" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900">
          </select>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 mb-1 block uppercase">No. WhatsApp</label>
          <input id="user-hp" type="number" placeholder="0812..." class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none">
        </div>
      </div>

      <button onclick="tambahUser()" id="btn-tambah-user" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-lg mt-4 uppercase tracking-widest text-xs active:scale-95 transition-all">
        Simpan Data Pengguna
      </button>
      <p id="info-user" class="text-center text-[10px] mt-2 font-bold"></p>
    </div>
  </div>
  </main>

  <script src="script.js"></script>
  <script>
  // 1. SATPAM CEK
  cekLogin();

  // 2. JALANKAN SATU FUNGSI SAJA
  window.onload = function() {
    // Fungsi ini akan mengambil data wilayah, 
    // lalu di dalamnya dia akan otomatis memanggil initUserPage()
    if (typeof loadWilayahDatabase === 'function') {
        loadWilayahDatabase();
    }
    
    // Daftar user tetap diload seperti biasa
    if (typeof loadUsers === 'function') {
        loadUsers();
    }
  };
</script>

  <footer class="text-center text-[10px] text-gray-400 mt-12 mb-4 px-10">
    &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
    Sistem Manajemen SDM Kabupaten Bekasi
  </footer>
</body>
</html>
