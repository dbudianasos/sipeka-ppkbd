<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Wilayah | siPeKa</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <script src="script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">
  <header class="bg-blue-900 py-4 px-5 text-white shadow-lg rounded-b-3xl">
    <div class="flex items-center gap-4 max-w-5xl mx-auto">
      <button onclick="window.location.href='dashboard-admin.html'" class="text-xl">⬅️</button>
      <h1 class="font-black text-sm uppercase">Master Data Wilayah</h1>
    </div>
  </header>

  <main class="p-6 max-w-5xl mx-auto">
    <div class="bg-white p-6 rounded-[2rem] shadow-sm">
      <div id="status-wilayah" class="mb-6 p-4 bg-blue-50 rounded-2xl border border-blue-100">
        <p class="text-[10px] font-bold text-blue-900 uppercase">Wilayah Otoritas:</p>
        <h2 id="display-wilayah" class="text-lg font-black text-slate-800 uppercase">Memuat...</h2>
      </div>

      <div class="mb-4">
        <label class="text-[10px] font-black text-slate-400 uppercase">Target Kecamatan:</label>
        <select id="select-kecamatan" onchange="updateInfoWilayah()" class="w-full p-3 mt-1 text-sm bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900 outline-none focus:ring-2 focus:ring-blue-600">
          <option value="">-- Pilih Kecamatan --</option>
          </select>
        <p id="msg-kecamatan" class="text-[9px] text-red-500 font-bold mt-1 hidden">*Pilih kecamatan tujuan terlebih dahulu</p>
      </div>
        
      <div class="space-y-4">
        <label class="text-[10px] font-black text-slate-400 uppercase">Input Nama-Nama Desa (Pisah Koma):</label>
        <textarea id="bulk-input" oninput="hitung()" placeholder="Contoh: Desa A, Desa B, Desa C..."
          class="w-full h-44 p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 text-sm font-bold uppercase"></textarea>
        
        <div class="flex justify-between items-center">
          <p class="text-[9px] text-slate-400 italic font-bold">Gunankan tanda koma (,) sebagai pemisah</p>
          <div class="bg-blue-900 text-white px-3 py-1 rounded-full text-[9px] font-black uppercase">
            Jumlah: <span id="counter">0</span>
          </div>
        </div>

        <button onclick="simpanData()" id="btn-save" class="w-full bg-blue-900 text-white font-black py-4 rounded-2xl shadow-lg mt-4 text-xs uppercase tracking-widest">
          Simpan Ke Database
        </button>
      </div>
    </div>
  </main>

  <script>
    // 1. AMBIL DATA DARI PENYIMPANAN LOKAL
    const role = localStorage.getItem("role");
    const kecAsli = localStorage.getItem("kecamatan");

    // 2. JALANKAN SAAT HALAMAN DIBUKA
    window.onload = () => {
        cekLogin(); // Pastikan satpam cek dulu
        
        // SET STATUS AWAL (Agar tidak "Memuat..." terus)
        const display = document.getElementById("display-wilayah");
        if (role === "super_admin") {
            display.innerText = "Kabupaten Bekasi";
        } else {
            display.innerText = "Kecamatan " + kecAsli;
        }

        // Tarik daftar kecamatan dari script.js
        if (typeof loadWilayahDatabase === 'function') {
            loadWilayahDatabase(); 
        }
    };

    // 3. UPDATE TEKS TAMPILAN WILAYAH (Dipanggil saat dropdown berubah)
    function updateInfoWilayah() {
        const selKec = document.getElementById("select-kecamatan");
        const display = document.getElementById("display-wilayah");
        
        // Jika Super Admin memilih kecamatan tertentu di dropdown
        if (selKec.value) {
            display.innerText = "Kecamatan " + selKec.value;
            document.getElementById("msg-kecamatan").classList.add("hidden");
        } else {
            // Jika tidak ada yang dipilih, kembalikan ke status awal
            display.innerText = (role === "super_admin") ? "Kabupaten Bekasi" : "Kecamatan " + kecAsli;
        }
    }

    // 4. HITUNG JUMLAH DESA SAAT MENGETIK
    function hitung() {
        const input = document.getElementById("bulk-input").value;
        const arrayDesa = input.split(",").filter(item => item.trim() !== "");
        document.getElementById("counter").innerText = arrayDesa.length;
    }

    // 5. FUNGSI SIMPAN DATA KE SPREADSHEET
    function simpanData() {
        const selKec = document.getElementById("select-kecamatan");
        const selectedOption = selKec.options[selKec.selectedIndex];
        const input = document.getElementById("bulk-input").value;
        
        // Validasi Pilihan Kecamatan
        if(!selKec.value) {
            document.getElementById("msg-kecamatan").classList.remove("hidden");
            selKec.focus();
            return;
        }

        // Validasi Input Desa
        if(!input.trim()) {
            alert("Silakan masukkan nama-nama desa/kelurahan, pisahkan dengan koma.");
            return;
        }

        const kodeKec = selectedOption.getAttribute("data-kode");
        const namaKec = selKec.value;
        const btn = document.getElementById("btn-save");

        btn.innerText = "⏳ SEDANG MENYIMPAN...";
        btn.disabled = true;

        // Kirim ke Google Apps Script
        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
                action: "save_bulk_wilayah",
                type: "desa",
                kode_kec: kodeKec,
                nama_kec: namaKec,
                data_list: input
            })
        })
        .then(res => res.text())
        .then(msg => {
            alert("Berhasil! " + msg);
            location.reload(); 
        })
        .catch(err => {
            alert("Gagal koneksi ke server!");
            btn.innerText = "SIMPAN KE DATABASE";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
