<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | siPeKa</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  
  <script src="script.js"></script>

  <script>
    cekLogin(); 
  </script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .nav-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%); }
    .admin-card { transition: 0.3s; }
    .admin-card:hover { transform: translateY(-3px); }
    select:disabled { background-color: #f1f5f9; cursor: not-allowed; color: #94a3b8; }
    /* Mencegah layar goyang ke samping di HP */
    body, html { overflow-x: hidden; width: 100%; }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-10">

  <header class="sticky top-0 z-50 nav-gradient py-2.5 px-5 rounded-b-[1.5rem] shadow-lg shadow-blue-900/20">
    <div class="flex justify-between items-center max-w-5xl mx-auto">
      <div class="flex items-center gap-3">
        <img src="logo-sipeka-dashbord.png" alt="SIPEKA ADMIN" class="h-9 md:h-11 w-auto">
        <span class="bg-yellow-400 text-blue-900 text-[10px] font-black px-2 py-0.5 rounded-md shadow-sm">ADMIN PANEL</span>
      </div>

      <div class="flex items-center gap-3">
        <button onclick="window.location.href='profil.html'" class="active:scale-95 transition">
          <img id="fotoProfilHeader" src="def-profil.png" onerror="this.src='def-profil.png'" class="w-10 h-10 rounded-full border-2 border-white/20 object-cover shadow-sm bg-slate-200">
        </button>
      
        <button onclick="logout()" 
                class="bg-red-500/10 hover:bg-red-500/20 p-2.5 rounded-xl border border-red-500/20 text-red-500 transition active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
      
    </div>
  </header>

  <main class="w-full px-5 pt-6 max-w-5xl mx-auto overflow-x-hidden">
    
    <div class="bg-white p-5 rounded-[1.5rem] mb-6 shadow-sm border-l-8 border-blue-900 flex items-center justify-between">
      <div>
        <p id="labelRole" class="text-[9px] text-blue-600 uppercase tracking-widest font-black mb-0.5">MEMUAT...</p>
        <h1 id="namaUser" class="text-xl font-black text-slate-800 tracking-tight leading-tight">Memuat...</h1>
        <p id="wilayahOtoritas" class="text-[10px] text-slate-400 font-bold uppercase mt-1">📍 Wilayah: ...</p>
      </div>
      <div id="iconRole" class="bg-blue-50 p-3 rounded-2xl text-2xl shadow-inner">👑</div>
    </div>

      <div class="grid grid-cols-2 gap-3 mb-8">
      <button onclick="window.location.href='master-wilayah.html'" class="admin-card bg-white p-4 rounded-[1.5rem] border border-blue-100 shadow-sm flex flex-col items-center text-center active:scale-95 transition-all">
        <div class="text-3xl mb-2">🗺️</div>
        <p class="text-[11px] font-bold text-slate-700">Master Wilayah</p>
        <span class="text-[8px] text-blue-500 font-bold mt-1 uppercase tracking-tighter">Kelola Desa</span>
      </button>
      
      <button onclick="window.location.href='user.html'" class="admin-card bg-white p-4 rounded-[1.5rem] border border-blue-100 shadow-sm flex flex-col items-center text-center active:scale-95 transition-all">
        <div class="text-3xl mb-2">👥</div>
        <p class="text-[11px] font-bold text-slate-700">Manajemen User</p>
        <span class="text-[8px] text-blue-500 font-bold mt-1 uppercase tracking-tighter">Kader & Admin</span>
      </button>

      
      <button onclick="window.location.href='approve.html'" class="admin-card bg-white p-4 rounded-[1.5rem] border border-blue-100 shadow-sm flex flex-col items-center text-center active:scale-95 transition-all">
        <div class="text-3xl mb-2">✅</div>
        <p class="text-[11px] font-bold text-slate-700">Validasi Laporan</p>
        <span class="text-[8px] text-blue-500 font-bold mt-1 uppercase tracking-tighter">Perlu Approve</span>
      </button>

      <button onclick="window.location.href='monev.html'" class="admin-card bg-white p-4 rounded-[1.5rem] border border-blue-100 shadow-sm flex flex-col items-center text-center active:scale-95 transition-all">
        <div class="text-3xl mb-2">📈</div>
        <p class="text-[11px] font-bold text-slate-700">Monev Wilayah</p>
        <span class="text-[8px] text-blue-500 font-bold mt-1 uppercase tracking-tighter">Semua Kader</span>
      </button>

      <button onclick="window.location.href='cetak1.html'" class="admin-card bg-white p-4 rounded-[1.5rem] border border-blue-100 shadow-sm flex flex-col items-center text-center active:scale-95 transition-all">
        <div class="text-3xl mb-2">🖨️</div>
        <p class="text-[11px] font-bold text-slate-700">Rekapitulasi</p>
        <span class="text-[8px] text-blue-500 font-bold mt-1 uppercase tracking-tighter">Cetak Bulanan</span>
      </button>

      <div onclick="window.location.href='log.html'" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 active:scale-95 transition cursor-pointer">
      <div class="w-12 h-12 rounded-2xl bg-slate-900 flex items-center justify-center text-xl shadow-lg shadow-slate-200">🕒</div>
      <div>
        <h3 class="font-black text-slate-800 text-sm uppercase">Log Aktivitas</h3>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Audit Jejak Digital</p>
      </div>
    </div>

    </div>

    <div class="bg-white p-4 md:p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-xs font-black text-blue-900 uppercase tracking-widest">📊 Statistik Performa</h3>
        <span class="text-[8px] bg-blue-100 text-blue-700 px-2 py-1 rounded-lg font-bold">REAL-TIME</span>
      </div>

      <div class="space-y-2 mb-6">
        <div class="flex gap-2">
          <select id="filter-tahun" onchange="loadGrafik()" class="flex-1 text-[10px] p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900"></select>
          <select id="filter-bulan" onchange="loadGrafik()" class="flex-[2] text-[10px] p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900">
            <option value="">Semua Bulan (Kumulatif)</option>
            <option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret">Maret</option>
            <option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option>
            <option value="Juli">Juli</option><option value="Agustus">Agustus</option><option value="September">September</option>
            <option value="Oktober">Oktober</option><option value="November">November</option><option value="Desember">Desember</option>
          </select>
        </div>

        <div id="admin-filter-area" class="grid grid-cols-1 gap-2">
          <select id="filter-kecamatan" onchange="loadGrafik()" class="text-[10px] p-3 bg-blue-50/50 border border-blue-100 rounded-xl font-bold text-blue-900">
             <option value="">-- Pilih Kecamatan --</option>
             <option value="SETU">SETU</option>
             </select>
          <select id="filter-desa" onchange="loadGrafik()" class="text-[10px] p-3 bg-blue-50/50 border border-blue-100 rounded-xl font-bold text-blue-900">
             <option value="">-- Pilih Desa --</option>
          </select>
          <select id="filter-user" onchange="loadGrafik()" class="w-full text-[10px] p-3 bg-blue-50 border border-blue-200 rounded-xl font-black text-blue-900 shadow-sm">
            <option value="">-- Semua Kader (Total Wilayah) --</option>
          </select>
        </div>
      </div>

      <div class="relative w-full mb-4" style="min-height: 250px;">
        <canvas id="myChart"></canvas>
      </div>

      <div class="grid grid-cols-2 gap-4 border-t pt-5 mt-5">
        <div class="text-center border-r">
          <p class="text-[8px] text-slate-400 uppercase font-bold mb-1">Total Laporan</p>
          <h2 id="total-realisasi" class="text-2xl font-black text-blue-900">0</h2>
        </div>
        <div class="text-center">
          <p class="text-[8px] text-slate-400 uppercase font-bold mb-1">Capaian Target</p>
          <h2 id="total-persen" class="text-2xl font-black text-green-600">0%</h2>
        </div>
      </div>
    </div>

    <div id="section-peringkat" class="mt-8">
      <h3 class="text-xs font-black text-slate-800 mb-4 ml-1 uppercase flex items-center gap-2">
        <span>🏆</span> Top 5 Performa Kader
      </h3>
      <div id="list-peringkat" class="space-y-3"></div>
    </div>

  </main>

  <footer class="text-center text-[10px] text-gray-400 mt-12 mb-4 italic px-10 leading-relaxed">
    &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
    Sistem Informasi Pelaporan Kinerja Kabupaten Bekasi
  </footer>

  <script>
    // 1. Inisialisasi Utama Dashboard
    function initAdminDashboard() {
      initDashboard();
      const role = localStorage.getItem("role");
      const nama = localStorage.getItem("nama");
      const kec = localStorage.getItem("kecamatan");
      const desa = localStorage.getItem("desa");

      if (document.getElementById("namaUser")) document.getElementById("namaUser").innerText = nama;
      
      let roleText = "";
      let wilayahText = "";

      // Pasang Info Otoritas
      if (role === "super_admin") {
        roleText = "Administrator Kabupaten";
        wilayahText = "Kabupaten Bekasi";
      } else if (role === "admin_kec") {
        roleText = "Administrator Kecamatan";
        wilayahText = "Kecamatan " + kec;
      } else if (role === "admin_desa") {
        roleText = "Administrator Desa";
        wilayahText = "Desa " + desa + " (" + kec + ")";
      }

      if(document.getElementById("labelRole")) document.getElementById("labelRole").innerText = roleText;
      if(document.getElementById("wilayahOtoritas")) document.getElementById("wilayahOtoritas").innerText = "📍 Otoritas: " + wilayahText;
      
      // Jalankan Engine Filter Dinamis
      initFilterWilayah(role, kec, desa);
    }

    // 2. Engine Filter Dinamis Berantai
    function initFilterWilayah(role, userKec, userDesa) {
      fetch(`${API_URL}?action=get_users&role_admin=${role}&kec_admin=${userKec}&desa_admin=${userDesa}`)
        .then(res => res.json())
        .then(users => {
           window.ALL_KADERS_DASHBOARD = users.filter(u => (u.Role || u.role) === "kader");
           
           const selKec = document.getElementById("filter-kecamatan");
           const selDesa = document.getElementById("filter-desa");

           // Isi Dropdown Kecamatan
           if (selKec) {
             const unikKec = [...new Set(window.ALL_KADERS_DASHBOARD.map(u => (u.Kecamatan || u.kecamatan || "").toUpperCase()))].sort();
             selKec.innerHTML = '<option value="">-- Semua Kecamatan --</option>';
             unikKec.forEach(k => { if(k) selKec.innerHTML += `<option value="${k}">${k}</option>`; });
             
             if (role !== "super_admin") {
               selKec.value = userKec.toUpperCase();
               selKec.disabled = true;
             }
           }

           // Isi Dropdown Desa (Untuk pertama kali)
           updateFilterDesaDash();
        });
    }

    // 3. Fungsi Saat Kecamatan Berubah (Refresh Desa)
    function updateFilterDesaDash() {
      const role = localStorage.getItem("role");
      const selKec = document.getElementById("filter-kecamatan") ? document.getElementById("filter-kecamatan").value.toUpperCase() : "";
      const selDesa = document.getElementById("filter-desa");

      if (selDesa && window.ALL_KADERS_DASHBOARD) {
        selDesa.innerHTML = '<option value="">-- Semua Desa --</option>';
        
        const filteredKader = window.ALL_KADERS_DASHBOARD.filter(u => selKec === "" || (u.Kecamatan || u.kecamatan || "").toUpperCase() === selKec);
        const unikDesa = [...new Set(filteredKader.map(u => (u.Desa || u.desa || "").toUpperCase()))].sort();
        
        unikDesa.forEach(d => { if(d) selDesa.innerHTML += `<option value="${d}">${d}</option>`; });

        if (role === "admin_desa") {
          selDesa.value = localStorage.getItem("desa").toUpperCase();
          selDesa.disabled = true;
        }
      }
      // Setelah Desa berubah, update Dropdown Kader
      updateFilterKaderDash();
    }

    // 4. Fungsi Saat Desa Berubah (Refresh Daftar Kader & Grafik)
    function updateFilterKaderDash() {
      const selKec = document.getElementById("filter-kecamatan") ? document.getElementById("filter-kecamatan").value.toUpperCase() : "";
      const selDesa = document.getElementById("filter-desa") ? document.getElementById("filter-desa").value.toUpperCase() : "";
      const userEl = document.getElementById("filter-user");

      if (userEl && window.ALL_KADERS_DASHBOARD) {
        userEl.innerHTML = '<option value="">-- Semua Kader (Total Wilayah) --</option>';
        
        window.ALL_KADERS_DASHBOARD.forEach(u => {
          const uKec = (u.Kecamatan || u.kecamatan || "").toUpperCase();
          const uDesa = (u.Desa || u.desa || "").toUpperCase();
          
          if ((selKec === "" || uKec === selKec) && (selDesa === "" || uDesa === selDesa)) {
             userEl.innerHTML += `<option value="${u.NIK || u.nik}">${u.Nama || u.nama}</option>`;
          }
        });
      }
      
      // Pemicu Terakhir: Load Ulang Grafik sesuai Pilihan
      loadGrafik();
    }

    // Ganti fungsi onchange di elemen HTML (Pastikan ID filter di HTML menggunakan fungsi baru ini)
    document.getElementById("filter-kecamatan").setAttribute("onchange", "updateFilterDesaDash()");
    document.getElementById("filter-desa").setAttribute("onchange", "updateFilterKaderDash()");

    // Jalankan saat halaman siap
    window.addEventListener('load', initAdminDashboard);
  </script>
</body>
</html>
