<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register CU (Grid) | siPeKa</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
    
    /* PAKU BUMI CSS */
    .tabel-sakti { border-collapse: separate !important; border-spacing: 0 !important; width: max-content; min-width: 100%; }
    .tabel-sakti th, .tabel-sakti td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
    .paku-no { position: sticky !important; left: 0px !important; z-index: 40 !important; background-color: #f8fafc !important; }
    .paku-desa { position: sticky !important; left: 35px !important; z-index: 40 !important; background-color: #ffffff !important; box-shadow: 3px 0 5px -2px rgba(0,0,0,0.1) !important; }
    .paku-atas-no { position: sticky !important; top: 0px !important; left: 0px !important; z-index: 60 !important; background-color: #1e3a8a !important; border-bottom: 1px solid #1e40af; }
    .paku-atas-desa { position: sticky !important; top: 0px !important; left: 35px !important; z-index: 60 !important; background-color: #1e3a8a !important; box-shadow: 3px 0 5px -2px rgba(0,0,0,0.5) !important; border-bottom: 1px solid #1e40af; }
    .paku-atas-biasa { position: sticky !important; top: 0px !important; z-index: 30 !important; border-bottom: 1px solid #1e40af; }

    /* INPUT GRID SIPEKA */
    .grid-input { width: 45px; text-align: center; border: 1px solid transparent; border-radius: 4px; font-size: 11px; font-weight: 800; padding: 4px; outline: none; transition: all 0.2s; background-color: transparent;}
    .grid-input:focus { border-color: #e67e22; background-color: #fff7ed; box-shadow: inset 0 0 0 1px #e67e22; color: #d35400; transform: scale(1.1); z-index: 10; position: relative;}
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .bg-readonly { background-color: #f1f5f9 !important; color: #94a3b8 !important; cursor: not-allowed; }
  </style>
</head>
<body class="pb-20">

  <!-- LOADER SIPEKA MENGAMBANG (HIDDEN BY DEFAULT) -->
  <div id="loader-sipeka" class="fixed inset-0 z-[200] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center text-white hidden">
    <div class="relative flex justify-center items-center">
        <div class="absolute w-24 h-24 border-4 border-orange-200 rounded-full animate-ping"></div>
        <div class="w-20 h-20 bg-orange-500 rounded-[1.5rem] flex items-center justify-center shadow-2xl animate-bounce border-4 border-white">
            <span class="text-white font-black text-xs uppercase tracking-tighter">siPeKa</span>
        </div>
    </div>
    <p id="loader-text" class="mt-8 text-[11px] font-black uppercase tracking-[0.3em] animate-pulse text-orange-200">Sinkronisasi Data Berjalan...</p>
  </div>

  <header class="bg-blue-900 py-4 px-5 rounded-b-[1.5rem] shadow-lg text-white flex justify-between items-center mb-6">
    <div class="flex items-center gap-3">
      <button onclick="window.location.href='menu-lapbul.html'" class="bg-white/10 p-2 rounded-xl active:scale-95 transition">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      </button>
      <div class="leading-tight">
        <h1 class="font-bold text-base uppercase">Register CU</h1>
        <p class="text-[9px] text-orange-300 uppercase tracking-widest font-bold">Peserta KB Aktif se-Kecamatan</p>
      </div>
    </div>
    <div id="wadah-tombol-vip"></div>
  </header>

  <main class="px-4 max-w-[100vw] mx-auto space-y-4">
    <!-- FILTER -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap md:flex-nowrap gap-4 items-end">
      <div class="w-full md:w-1/4">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Tahun</label>
        <select id="cu-tahun" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900 text-xs"></select>
      </div>
      <div class="w-full md:w-1/4">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Bulan</label>
        <select id="cu-bulan" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900 text-xs uppercase">
            <option value="JANUARI">JANUARI</option><option value="FEBRUARI">FEBRUARI</option><option value="MARET">MARET</option>
            <option value="APRIL">APRIL</option><option value="MEI">MEI</option><option value="JUNI">JUNI</option>
            <option value="JULI">JULI</option><option value="AGUSTUS">AGUSTUS</option><option value="SEPTEMBER">SEPTEMBER</option>
            <option value="OKTOBER">OKTOBER</option><option value="NOVEMBER">NOVEMBER</option><option value="DESEMBER">DESEMBER</option>
        </select>
      </div>
      <div class="w-full md:w-2/4">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Kecamatan</label>
        <select id="cu-kecamatan" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-blue-900 text-xs uppercase">
          <option value="">⏳ MEMUAT KECAMATAN...</option>
        </select>
      </div>
      <div class="w-full md:w-auto flex-shrink-0">
        <button onclick="tarikDataGridCU()" class="w-full bg-[#e67e22] hover:bg-[#d35400] text-white font-black text-[11px] uppercase tracking-widest px-6 py-3 rounded-xl shadow transition active:scale-95">
          Tarik Data
        </button>
      </div>
    </div>

    <!-- AREA GRID -->
    <div id="area-grid-cu" class="hidden bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden relative">
      <div class="bg-slate-800 text-white p-3 flex justify-between items-center z-50 relative">
        <div class="flex items-center gap-4">
          <h3 class="text-[11px] font-black uppercase tracking-widest">📝 Smart Grid CU</h3>
          <button id="btn-do-pintar" onclick="terapkanDOPintar()" class="hidden bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-400 hover:to-indigo-400 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest shadow-lg shadow-purple-500/30 flex items-center gap-1 transition active:scale-95">
            ✨ DO Pintar
          </button>
        </div>
        <span class="text-[9px] text-blue-200 font-bold px-2 py-1 bg-white/10 rounded-lg">Geser ➡️</span>
      </div>
      
      <div class="overflow-x-auto pb-6" style="max-height: 65vh;">
        <table class="tabel-sakti">
          <thead class="text-white text-center text-[9px] uppercase tracking-tighter">
            <tr class="bg-blue-900">
              <th rowspan="2" class="p-2 paku-atas-no w-[35px]">NO</th>
              <th rowspan="2" class="p-2 paku-atas-desa min-w-[130px]">DESA / KEL.</th>
              <th rowspan="2" class="p-2 paku-atas-biasa bg-blue-800 min-w-[70px]">PUS</th>
              <th colspan="2" class="p-1 paku-atas-biasa bg-slate-700">IUD</th>
              <th colspan="2" class="p-1 paku-atas-biasa bg-orange-700/80">MOW</th>
              <th colspan="2" class="p-1 paku-atas-biasa bg-orange-700/80">MOP</th>
              <th colspan="2" class="p-1 paku-atas-biasa bg-slate-700">KDM</th>
              <th colspan="2" class="p-1 paku-atas-biasa bg-slate-700">IMP</th>
              <th colspan="2" class="p-1 paku-atas-biasa bg-slate-700">STK</th>
              <th colspan="2" class="p-1 paku-atas-biasa bg-slate-700">PIL</th>
              <th rowspan="2" class="p-2 paku-atas-biasa bg-emerald-700 min-w-[60px]">TOT KB</th>
              <th colspan="4" class="p-1 paku-atas-biasa bg-red-800">BUKAN PESERTA KB</th>
              <th rowspan="2" class="p-2 paku-atas-biasa bg-slate-900 min-w-[60px]">SELISIH<br>PUS</th>
            </tr>
            <tr class="bg-blue-800 text-[8px]">
              <th class="py-1">P</th><th>S</th> <th class="bg-orange-600/80 py-1">P</th><th class="bg-orange-600/80">S</th>
              <th class="bg-orange-600/80 py-1">P</th><th class="bg-orange-600/80">S</th> <th class="py-1">P</th><th>S</th>
              <th class="py-1">P</th><th>S</th> <th class="py-1">P</th><th>S</th>
              <th class="py-1">P</th><th>S</th>
              <th class="bg-red-700 py-1 w-[50px]">HAMIL</th><th class="bg-red-700 py-1 w-[50px]">IAS</th>
              <th class="bg-red-700 py-1 w-[50px]">IAT</th><th class="bg-red-700 py-1 w-[50px]">TIAL</th>
            </tr>
          </thead>
          <tbody id="tbody-grid-cu" class="bg-white">
            <!-- Render JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="cu-grid.js"></script>
</body>
</html>
