<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register CU | siPeKa</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
  <header class="sticky top-0 z-50 bg-blue-900 py-4 px-5 rounded-b-[1.5rem] shadow-lg text-white flex justify-between items-center">
    <div class="flex items-center gap-3">
      <button onclick="window.location.href='menu-lapbul.html'" class="bg-white/10 p-2 rounded-xl active:scale-95 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <div class="leading-tight">
        <h1 class="font-bold text-base uppercase">Register CU</h1>
        <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold">Form Register CU (Peserta KB Aktif)</p>
      </div>
    </div>
    
    <div id="wadah-tombol-ab" class="flex gap-2">
      <!-- Muncul via JS: Draft & Realist -->
    </div>
  </header>
<main id="main-content" class="px-4 pt-6 max-w-5xl mx-auto space-y-4">
<div class="card-sipeka">
  
  <!-- Panel Filter -->
  <div class="filter-box">
    <label>Desa:</label>
    <select id="cu_desa">
      <option value="">-- Pilih Desa --</option>
      <option value="CIJENGKOL">Cijengkol</option>
      <option value="BURANGKENG">Burangkeng</option>
      <!-- Tambahkan desa lainnya -->
    </select>
    
    <label>Bulan:</label>
    <select id="cu_bulan">
      <option value="JUNI">Juni</option>
      <option value="JULI">Juli</option>
      <!-- Tambahkan bulan lainnya -->
    </select>
    
    <button onclick="tarikDataCU()" class="btn-sipeka-orange">Tarik Data Baseline</button>
  </div>

  <hr>

  <!-- Form Input Data CU -->
  <form id="form_cu" style="display:none;">
    <!-- Sembunyikan data meta agar form tidak penuh -->
    <input type="hidden" id="cu_no">
    <input type="hidden" id="cu_tahun">
    <input type="hidden" id="cu_kecamatan">

    <div class="input-group">
      <label>Total PUS:</label>
      <input type="number" id="cu_pus" required>
    </div>

    <h4>Data Alkon (P & S)</h4>
    <div class="grid-alkon" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
      <!-- Contoh IUD -->
      <div>
        <label>IUD (P):</label><input type="number" id="cu_iud_p">
        <label>IUD (S):</label><input type="number" id="cu_iud_s">
      </div>
      <!-- Contoh IMPLAN -->
      <div>
        <label>IMP (P):</label><input type="number" id="cu_imp_p">
        <label>IMP (S):</label><input type="number" id="cu_imp_s">
      </div>
      <!-- Contoh PIL -->
      <div>
        <label>PIL (P):</label><input type="number" id="cu_pil_p">
        <label>PIL (S):</label><input type="number" id="cu_pil_s">
      </div>
      <!-- Silakan Bapak tambahkan input MOW, MOP, KDM, STK dengan format yang sama -->
    </div>

    <hr>
    <h4>Bukan Peserta KB</h4>
    <div class="grid-non-kb" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
      <div><label>Hamil:</label><input type="number" id="cu_hamil"></div>
      <div><label>IAS:</label><input type="number" id="cu_ias"></div>
      <div><label>IAT:</label><input type="number" id="cu_iat"></div>
      <div><label>TIAL:</label><input type="number" id="cu_tial"></div>
    </div>

    <button type="button" onclick="simpanDataCU()" class="btn-sipeka-green" style="margin-top: 20px; width: 100%;">💾 Simpan Register CU</button>
  </form>
</div>

</main>

<script src="script.js"></script>
  <script src="lapbul.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof cekLogin === "function") cekLogin();
      if (typeof initKhususAB === "function") {
          setTimeout(initKhususAB, 500);
      }
    });
  </script>

<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
  &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
  Aplikasi Pelaporan Kinerja PPKBD
</footer>
</body>
</html>
