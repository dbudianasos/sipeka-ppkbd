<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Monitoring | siPeKa PPKBD</title>
  <link rel="icon" type="image/png" href="logo-sipeka.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { font-family: 'Poppins', sans-serif; }
    /* Disamakan persis dengan warna dashboard */
    .nav-gradient { background: linear-gradient(135deg, #004a99 0%, #002d5f 100%); }
  </style>
</head>

<body class="bg-slate-50 min-h-screen pb-20">

<header class="sticky top-0 z-50 nav-gradient py-2.5 px-5 rounded-b-[1.5rem] shadow-lg shadow-blue-900/20">
  <div class="flex items-center gap-3 max-w-5xl mx-auto text-white">
    <button onclick="window.location.href='dashboard-kader.html'" 
            class="bg-white/10 hover:bg-white/20 p-2 rounded-xl backdrop-blur-md border border-white/10 transition active:scale-95 shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button>
    <div class="leading-tight">
      <h1 class="font-bold text-base">Riwayat Laporan</h1>
      <p class="text-[9px] text-blue-200 uppercase tracking-widest font-bold mt-0.5">Pantau status visum Anda</p>
    </div>
  </div>
</header>

<main class="px-4 pt-6 max-w-5xl mx-auto">
  <div class="grid grid-cols-2 gap-3 mb-6">
    <div class="bg-white p-4 rounded-2xl border-b-4 border-green-500 shadow-sm text-center">
      <p class="text-[8px] font-black text-slate-400 uppercase">Approved</p>
      <p id="stat-approved" class="text-xl font-black text-slate-700">0</p>
    </div>
    <div class="bg-white p-4 rounded-2xl border-b-4 border-orange-400 shadow-sm text-center">
      <p class="text-[8px] font-black text-slate-400 uppercase">Draft/Pending</p>
      <p id="stat-pending" class="text-xl font-black text-slate-700">0</p>
    </div>
  </div>

  <div class="space-y-4" id="list-riwayat-kader">
    <p class="text-center text-sm text-gray-400 py-10 italic animate-pulse">Sinkronisasi visum...</p>
  </div>
</main>

<script src="script.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    cekLogin();
    loadRiwayatKader();
  });
</script>
  <div id="modal-foto" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
    <div class="relative w-full max-w-lg">
      <button onclick="tutupIntip()" class="absolute -top-12 right-0 bg-white/20 hover:bg-white/40 text-white px-4 py-2 rounded-xl font-bold transition">
        ✕ TUTUP
      </button>
      <div class="bg-white p-2 rounded-3xl shadow-2xl overflow-hidden">
        <img id="img-intip" src="" class="w-full h-auto rounded-2xl shadow-inner">
      </div>
      <p class="text-center text-white/50 text-[10px] mt-4 uppercase tracking-widest font-bold">Preview Visum siPeKa</p>
    </div>
  </div>
<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4">
  &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
  Aplikasi Pelaporan Kinerja PPKBD
</footer>
</body>
</html>
