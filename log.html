<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Aktivitas | siPeKa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">
  <header class="sticky top-0 z-50 bg-slate-900 py-4 px-5 rounded-b-[2rem] shadow-lg text-white">
    <div class="flex items-center gap-4 max-w-5xl mx-auto">
      <button onclick="navigasiKembali()" class="bg-white/10 p-2 rounded-xl active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <div>
        <h1 class="font-bold text-lg leading-tight uppercase">Log Aktivitas</h1>
        <p class="text-[9px] text-slate-400 uppercase tracking-widest font-bold">Audit Sistem & Jejak Digital</p>
      </div>
    </div>
  </header>

  <main class="px-5 pt-6 max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <h3 class="font-black text-slate-800 text-xs uppercase tracking-tighter">🕒 100 Aktivitas Terakhir</h3>
      <button onclick="loadLogAktivitas()" class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-2 rounded-xl">REFRESH</button>
    </div>

    <div id="container-log" class="relative border-l-2 border-slate-200 ml-3 space-y-8 pb-10">
      <p class="text-center text-[10px] text-slate-400 py-10 italic">Mengambil riwayat audit...</p>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      cekLogin();
      loadLogAktivitas();
    });
  </script>
<footer class="text-center text-[10px] text-gray-400 mt-12 mb-4 italic px-10 leading-relaxed">
  &copy; 2026 siPeKa PPKBD by Dian Budiana<br>
  Sistem Informasi Pelaporan Kinerja Kabupaten Bekasi
</footer>
</body>
</html>
