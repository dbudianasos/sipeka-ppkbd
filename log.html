<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Trail | siPeKa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">
  <header class="sticky top-0 z-50 bg-slate-900 py-3 px-5 rounded-b-[1.5rem] shadow-lg text-white">
    <div class="flex justify-between items-center max-w-5xl mx-auto">
      <div class="flex items-center gap-3">
        <button onclick="navigasiKembali()" class="bg-white/10 p-2 rounded-xl active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </button>
        <div class="leading-tight">
          <h1 class="font-bold text-base uppercase">Audit Trail</h1>
          <p id="info-total-log" class="text-[8px] text-blue-400 font-bold uppercase tracking-widest mt-0.5">Mengecek Kapasitas...</p>
        </div>
      </div>
      
      <button id="btn-backup-log" onclick="backupLogKeCSV()" class="hidden bg-green-500 text-white text-[10px] font-black uppercase px-4 py-2 rounded-xl shadow-lg active:scale-95 transition flex items-center gap-2">
        <span>📥</span> Backup CSV
      </button>
    </div>
  </header>

  <main class="px-4 pt-6 max-w-5xl mx-auto">
    <div id="panel-filter-log" class="hidden bg-white p-4 rounded-3xl shadow-sm border border-slate-100 mb-6 space-y-3">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-lg">⚙️</span>
        <h3 class="font-black text-slate-800 text-[11px] uppercase tracking-widest">Filter Audit</h3>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <select id="filter-aksi-log" onchange="renderLogSesuaiOtoritas()" class="w-full p-3 text-[10px] bg-slate-50 border border-slate-100 rounded-xl outline-none font-bold text-blue-900 uppercase">
          <option value="">Semua Aktivitas</option>
          <option value="LOGIN">Hanya Login</option>
          <option value="TAMBAH">Hanya Tambah Data</option>
          <option value="HAPUS">Hanya Penghapusan</option>
          <option value="EDIT">Hanya Perubahan</option>
          <option value="APPROVAL">Hanya Approval</option>
        </select>
        <input type="text" id="search-log" oninput="renderLogSesuaiOtoritas()" placeholder="Cari Nama / NIK..." class="w-full p-3 text-[10px] bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-600 font-bold uppercase">
      </div>
    </div>

    <div id="container-log" class="space-y-4">
      <p class="text-center text-[10px] text-slate-400 py-10 italic animate-pulse">Menghubungkan ke arsip keamanan...</p>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      cekLogin();
      loadLogAktivitas();
    });
  </script>
</body>
</html>
